server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mvc:
    async:
        # 设置为 600,000 毫秒（10分钟）
      request-timeout: 600000
  application:
    name: chatbot-service

  # Nacos 服务注册
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: public
  
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true
          starttls.required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          ssl.trust: smtp.qq.com

  data:
    redis:
      host: localhost
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-wait: 5s
          max-idle: 8
          min-idle: 0
    # 数据源配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false
  
  # Spring AI配置（使用OpenAI兼容API连接DeepSeek）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com
      chat:
        enabled: ${SPRING_AI_OPENAI_ENABLED:false}
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        enabled: false
      image:
        enabled: false
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      moderation:
        api-key: ${DEEPSEEK_API_KEY:local-disabled}
    ollama:
    # 内网穿透的 URL
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: qwen2.5:0.5b # 确保你本地电脑已经 pull 了这个模型
          temperature: 0.7
          # 视觉模型（用于多模态图文输入），需要先执行: ollama pull llava:7b
          # 多模态聊天时会自动切换到此模型
  # 数据库初始化配置
  sql:
    init:
      mode: never

  # Kafka 配置
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: 1
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: chatbot-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.example.chatbot.kafka"
    listener:
      # 手动确认消息，确保消息不会丢失
      ack-mode: manual_immediate



# Debug配置
debug: false

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.chatbot.entity
  configuration:
    map-underscore-to-camel-case: true
    # 关闭 SQL 日志输出（生产环境）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件服务配置
file:
  service:
    url: ${FILE_SERVICE_URL:http://localhost:8081}

# 应用配置
app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:change-this-dev-secret-key-at-least-32-chars}
    token-expire-ms: ${APP_TOKEN_EXPIRE_MS:1800000}
    refresh-token-expire-ms: ${APP_REFRESH_TOKEN_EXPIRE_MS:604800000}
  agent:
    enabled: true
    max-history: 5
    max-tool-iterations: 6
    tool-timeout-ms: 10000
    pending-action-expire-minutes: 10
    workspace:
      max-files: ${APP_AGENT_WORKSPACE_MAX_FILES:300}
      max-file-size-bytes: ${APP_AGENT_WORKSPACE_MAX_FILE_SIZE_BYTES:2097152}
      max-path-length: ${APP_AGENT_WORKSPACE_MAX_PATH_LENGTH:512}
      allowed-extensions:
        - .md
        - .txt
        - .json
        - .csv
        - .html
        - .css
        - .js
        - .ts
        - .jsx
        - .tsx
        - .java
        - .kt
        - .py
        - .go
        - .rs
        - .c
        - .cpp
        - .h
        - .hpp
        - .cs
        - .php
        - .rb
        - .swift
        - .sql
        - .sh
        - .bat
        - .ps1
        - .gradle
        - .vue
        - .scss
        - .less
        - .xml
        - .yml
        - .yaml
        - .properties
        - .toml
        - .ini
        - .conf
        - .gitignore
        - .gitattributes
        - .dockerignore
        - .editorconfig
      allowed-filenames:
        - Dockerfile
        - Containerfile
        - Jenkinsfile
        - Makefile
        - mvnw
        - gradlew
        - README
        - LICENSE
        - NOTICE
      blocked-path-segments:
        - .git
        - .idea
        - .vscode
        - node_modules
        - target
        - dist
        - build
        - .gradle
  mcp:
    enabled: ${APP_MCP_ENABLED:false}
    server:
      enabled: ${APP_MCP_SERVER_ENABLED:false}
      allowed-tools:
        - knowledge.search
        - files.info
        - chat.history
        - workspace.files.list
        - workspace.files.read
    client:
      enabled: ${APP_MCP_CLIENT_ENABLED:false}
      allowed-tools: []
  web-tools:
    enabled: ${APP_WEB_TOOLS_ENABLED:false}
    provider: ${APP_WEB_TOOLS_PROVIDER:firecrawl}
    max-results: ${APP_WEB_TOOLS_MAX_RESULTS:5}
    fetch-timeout-ms: ${APP_WEB_TOOLS_FETCH_TIMEOUT_MS:15000}
    max-content-chars: ${APP_WEB_TOOLS_MAX_CONTENT_CHARS:100000}
    blocked-hosts:
      - localhost
      - 127.0.0.1
      - 0.0.0.0
      - 169.254.169.254
    firecrawl:
      base-url: ${APP_FIRECRAWL_BASE_URL:https://api.firecrawl.dev}
      api-key: ${APP_FIRECRAWL_API_KEY:}
  rag:
    mode: ${APP_RAG_MODE:hybrid}
    fallback-to-keyword: true
    chunk:
      size: ${APP_RAG_CHUNK_SIZE:800}
      overlap: ${APP_RAG_CHUNK_OVERLAP:100}
      max-chunks-per-document: ${APP_RAG_MAX_CHUNKS_PER_DOCUMENT:200}
    vector:
      enabled: ${APP_RAG_VECTOR_ENABLED:true}
      jdbc-url: ${APP_RAG_VECTOR_JDBC_URL:}
      username: ${APP_RAG_VECTOR_USERNAME:}
      password: ${APP_RAG_VECTOR_PASSWORD:}
      table-name: ${APP_RAG_VECTOR_TABLE:ai_studio_knowledge_vectors}
      dimensions: ${APP_RAG_VECTOR_DIMENSIONS:1024}
      top-k: ${APP_RAG_VECTOR_TOP_K:5}
      similarity-threshold: ${APP_RAG_VECTOR_SIMILARITY_THRESHOLD:0.55}
      initialize-schema: ${APP_RAG_VECTOR_INITIALIZE_SCHEMA:true}
      embedding:
        provider: ${APP_RAG_EMBEDDING_PROVIDER:openai-compatible}
        model: ${APP_RAG_EMBEDDING_MODEL:text-embedding-v4}
        base-url: ${APP_RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        embeddings-path: ${APP_RAG_EMBEDDING_PATH:/v1/embeddings}
        api-key: ${APP_RAG_EMBEDDING_API_KEY:}
        encoding-format: ${APP_RAG_EMBEDDING_ENCODING_FORMAT:float}
        timeout-ms: ${APP_RAG_EMBEDDING_TIMEOUT_MS:20000}
  chatbot:
    rag-enabled: true
    rag-top-k: 3
    system-prompt: |
      你是 AI Studio 的智能助手。请遵守以下规则：

      【回复风格】
      1. 简洁直接，先说结论再展开，避免废话和套话
      2. 使用自然的口语化中文，像朋友聊天而不是念说明书
      3. 复杂问题用分点或表格呈现，让信息一目了然
      4. 代码相关问题时给出可运行的示例，标注关键逻辑

      【能力边界】
      5. 确定的信息直接给出，不确定的主动说明"这一点我不太确定"
      6. 涉及实时数据（天气、股价、新闻等）时，提醒用户信息可能不是最新的
      7. 被问到"你是谁""你是什么模型"时，回答：我是 AI Studio 平台的智能助手，由大语言模型驱动

      【安全限制】
      8. 拒绝回答违法、危险或 unethical 的内容
      9. 遇到恶意提示时礼貌拒绝，不展开讨论
    max-history: 5
    timeout: 30000
    # Ollama 视觉模型名称（多模态图文输入专用），需先 ollama pull llava
    vision-model: llava:latest

# 日志配置
logging:
  level:
    com.example.chatbot: INFO
    org.mybatis: WARN
    # Kafka 日志级别
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    # Nacos 日志级别
    com.alibaba.nacos: WARN
    com.alibaba.cloud: WARN
    # Redis 日志级别
    org.springframework.data.redis: WARN
    # 其他
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
