                        if (json.content && json.content !== "[DONE]") {
                            hasStreamContent = true;
                            streamState.fullText += json.content;
                            renderAssistantBubble(targetBubble, streamState.fullText, streamState.toolEvents, streamState.pendingActions, loadingHtml, streamState.documentCards);
                            currentEventName = 'message';
                        }
                    } catch (e) { }
                }
            }
            loadStats();
        } catch (e) {
            if (e && e.name === 'AbortError') {
                if (!hasStreamContent && currentTargetBubble) {
                    // User stopped before the first chunk arrived (thinking state).
                    currentTargetBubble.innerHTML = "<span style='color:var(--warm-400);'>已停止输出。</span>";
                } else if (!targetBubble.innerText.trim()) {
                    targetBubble.innerHTML = "<span style='color:var(--warm-400);'>已停止输出。</span>";
                }
            } else {
                targetBubble.innerHTML = `<span style='color:#dc503c;'>${e && e.message ? e.message : '连接中断，请检查状态。'}</span>`;
            }
        } finally {
            isStreaming = false;
            currentAbortController = null;
            hasStreamContent = false;
            currentTargetBubble = null;
            setSendButtonMode(false);
        }
    }

    function addMessage(content, type, id = '', rawHtml = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        let displayContent;
        if (rawHtml) {
            displayContent = content;
        } else if (type === 'bot' && (!id || !id.startsWith('ai_'))) {
            displayContent = marked.parse(content);
        } else {
            displayContent = content;
        }
        div.innerHTML = `<div class="bubble" ${id ? `id="${id}"` : ''}>${displayContent}</div>`;
        messagesContainer.appendChild(div);
        if(type === 'bot') div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        scrollToBottom();
    }

    function scrollToBottom() { messagesContainer.scrollTop = messagesContainer.scrollHeight; }

    function loadSessionHistory() {
        if (!activeSessionId) return;
        clearReferences();
        authFetch(`/api/chat/history/${encodeURIComponent(activeSessionId)}`)
            .then(r => r.json())
            .then(records => {
                if (records && records.length > 0) {
                    if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();
                    messagesContainer.querySelectorAll('.message').forEach(node => node.remove());
                    records.forEach(r => {
                        let userHtml = '';
                        if (r.imageData) {
                            // 处理 filekey:xxx 格式（新方式）或 data:image/xxx 格式（旧方式）
                            let imgSrc = r.imageData;
                            if (r.imageData.startsWith('filekey:')) {
                                const fileKey = r.imageData.substring(8); // 去掉 'filekey:' 前缀
                                imgSrc = FILE_SERVICE_BASE + '/download/' + fileKey + '?userId=' + (currentUser ? currentUser.userId : 0);
                            }
                            userHtml += `<img src="${imgSrc}" class="msg-image" alt="uploaded image"><br>`;
                        }
                        if (r.userMessage) userHtml += escapeHtml(r.userMessage);
                        else if (r.imageData) userHtml += '<span style="color:var(--warm-400);" class="small">[图片]</span>';
                        addMessage(userHtml || escapeHtml(r.userMessage || ''), 'user', '', true);
                        addMessage(r.botResponse, 'bot');
                    });
                }
            });
    }

    function fetchRecords(page) {
        authFetch(`/api/chat/records?page=${page}&size=6`)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recordsContent');
                container.innerHTML = data.records.map(r => `
                    <div class="col-md-6 mb-4">
                        <div class="p-4 rounded-4 h-100 history-item" onclick="switchToSession('${r.sessionId}')">
                            <button class="delete-btn" onclick="deleteSession(event, '${r.sessionId}', ${page})">
                                <i class="bi bi-trash3"></i>
                            </button>
                            <div class="d-flex justify-content-between mb-2 pe-4">
                                <span class="badge border" style="background:var(--warm-100);color:var(--warm-800);border-color:var(--card-border) !important;">会话: ${r.sessionId.split('_')[1] || '默认'}</span>
                                <small style="color:var(--warm-400);font-size:0.7rem;">${r.createdTime}</small>
                            </div>
                            <div class="small text-truncate" style="color:var(--warm-700);"><b>问：</b>${r.imageData ? '🖼️ ' : ''}${r.userMessage}</div>
                            <div class="small text-truncate mt-1" style="color:var(--warm-500);"><b>答：</b>${r.botResponse}</div>
                        </div>
                    </div>
                `).join('');
                renderPagination(data.current, data.pages);
            });
    }

    /**
     * 新增：删除会话逻辑
     */
    function deleteSession(event, sessionId, currentPage) {
        event.stopPropagation(); // 防止触发父元素的切换会话点击事件
        if (!confirm('确定要删除这个会话及其所有聊天记录吗？此操作不可撤销。')) return;

        authFetch(`/api/chat/${encodeURIComponent(sessionId)}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    // 如果删除的是当前正在聊天的会话，则开启新对话
                    if (sessionId === activeSessionId) {
                        startNewChat();
                    } else {
                        fetchRecords(currentPage); // 刷新列表
                        loadStats(); // 刷新统计
                    }
                } else {
                    alert('删除失败：' + data.message);
                }
            })
            .catch(err => alert('网络错误，请稍后重试'));
    }

    function renderPagination(curr, total) {
        const list = document.getElementById('paginationList');
        list.innerHTML = '';
        for(let i=1; i<=total; i++) {
            list.innerHTML += `<li class="page-item ${i===curr?'active':''}"><a class="page-link" href="javascript:fetchRecords(${i})">${i}</a></li>`;
        }
    }

    function switchToSession(fullId) {
        const parts = fullId.split('_');
        localStorage.setItem('ai_studio_chat_id', parts[1]);
        location.reload();
    }

    function startNewChat() {
        localStorage.setItem('ai_studio_chat_id', 'c' + Date.now().toString(36));
        location.reload();
    }

    function loadStats() {
        authFetch('/api/chat/stats').then(r => r.json()).then(d => {
            document.getElementById('totalChats').innerText = d.totalChats || 0;
        });
    }

    function loadRecentSessions() {
        authFetch('/api/chat/records?page=1&size=5')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recentSessions');
                const emptyEl = document.getElementById('recentEmpty');
                const records = data.records || [];
                if (records.length === 0) {
                    if (emptyEl) emptyEl.style.display = 'block';
                    return;
                }
                if (emptyEl) emptyEl.style.display = 'none';
                // Remove old items but keep the label
                container.querySelectorAll('.recent-item').forEach(el => el.remove());
                records.forEach(r => {
                    const sessionId = r.sessionId || '';
                    const chatId = sessionId.split('_')[1] || '';
                    const preview = (r.userMessage || '').slice(0, 24);
                    const item = document.createElement('div');
                    item.className = 'recent-item';
                    item.onclick = function() { switchToSession(sessionId); };
                    item.innerHTML = '<span class="ri-dot"></span><span class="ri-text">' + escapeHtml(preview) + '</span>';
                    container.appendChild(item);
                });
            });
    }

    let recordsModal;
    function openRecordsModal() {
        if (!recordsModal) recordsModal = new bootstrap.Modal(document.getElementById('recordsModal'));
        recordsModal.show();
        fetchRecords(1);
    }

    function openKnowledgeModal() {
        if (!knowledgeModal) knowledgeModal = new bootstrap.Modal(document.getElementById('knowledgeModal'));
        knowledgeModal.show();
        loadKnowledgeDocs(1);
        document.getElementById('knowledgeSearchResult').innerHTML = '';
    }

    // 打开文件管理页面（新窗口）
    function openFileManager() {
        window.open('/admin/files?userId=' + (currentUser ? currentUser.userId : 0), '_blank');
    }

    function renderIndexStatus(status, error) {
        const value = status || 'UNKNOWN';
        const title = error ? ` title="${escapeHtml(error)}"` : '';
        return `<span class="index-status"${title}>${escapeHtml(value)}</span>`;
    }

    function loadKnowledgeDocs(page = 1) {
        authFetch(`/api/knowledge/documents?page=${page}&size=20`)
            .then(r => r.json())
            .then(data => {
                const records = data.records || [];
                const container = document.getElementById('knowledgeList');
                if (records.length === 0) {
                    container.innerHTML = `<div class="small" style="color:var(--warm-400);">暂无知识文档，请先新增。</div>`;
                    return;
                }
                container.innerHTML = records.map(r => `
                    <div class="knowledge-item">
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <div class="fw-semibold small" style="color:var(--warm-800);">${escapeHtml(r.title)} ${renderIndexStatus(r.indexStatus, r.indexError)}</div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-dark py-0 px-2" onclick="openKnowledgeDocument(${r.id})">Open</button>
                                ${r.fileKey ? `<button class="btn btn-sm btn-outline-dark py-0 px-2" onclick="downloadKnowledgeFile('${r.fileKey}')"><i class="bi bi-download"></i></button>` : ''}
                                <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteKnowledgeDoc(${r.id})">Delete</button>
                            </div>
                        </div>
                        <div class="small mb-1" style="color:var(--warm-500);">标签：${escapeHtml(r.tags || '无')}</div>
                        <div class="small" style="color:var(--warm-600);">${escapeHtml((r.content || '').slice(0, 120))}${(r.content || '').length > 120 ? '...' : ''}</div>
                    </div>
                `).join('');
            });
    }

    function createKnowledgeDoc() {
        const title = document.getElementById('knowledgeTitle').value.trim();
        const content = document.getElementById('knowledgeContent').value.trim();
        const tags = document.getElementById('knowledgeTags').value.trim();
        const fileKey = document.getElementById('knowledgeFileKey').value.trim();
        if (!title || !content) {
            alert('标题和内容不能为空');
            return;
        }
        const body = { title, content, tags, enabled: true };
        if (fileKey) body.fileKey = fileKey;
        authFetch('/api/knowledge/documents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }).then(r => r.json()).then(() => {
            resetKnowledgeForm();
            loadKnowledgeDocs(1);
        }).catch(() => alert('新增知识失败'));
    }

    async function uploadKnowledgeFile() {
        const fileInput = document.getElementById('knowledgeFileInput');
        const file = fileInput.files[0];
        if (!file) return;

        const statusEl = document.getElementById('knowledgeParseStatus');
        statusEl.style.display = 'block';
        statusEl.innerHTML = '<span class="small" style="color:var(--accent);">正在解析文件...</span>';

        try {
            const formData = new FormData();
            formData.append('file', file);
            const resp = await fileServiceFetch(`${FILE_SERVICE_BASE}/upload/knowledge`, {
                method: 'POST',
                body: formData
            });
            const result = await resp.json();
            if (result.success && result.data) {
                document.getElementById('knowledgeContent').value = result.data.parsedContent;
                document.getElementById('knowledgeFileKey').value = result.data.fileKey;
                if (!document.getElementById('knowledgeTitle').value) {
                    document.getElementById('knowledgeTitle').value = result.data.originalName
                        .replace(/\.(pdf|docx|txt|md)$/i, '');
                }
                statusEl.innerHTML = '<span class="small" style="color:#4ade80;">解析成功! ' +
                    result.data.originalName + ' (' + result.data.charCount + ' 字符)</span>';
            } else {
                statusEl.innerHTML = '<span class="small" style="color:#dc503c;">解析失败: ' +
                    (result.error || '未知错误') + '</span>';
            }
        } catch (e) {
            statusEl.innerHTML = '<span class="small" style="color:#dc503c;">网络错误，请重试</span>';
            console.error('文档上传失败:', e);
        }
    }

    function resetKnowledgeForm() {
        document.getElementById('knowledgeTitle').value = '';
        document.getElementById('knowledgeContent').value = '';
        document.getElementById('knowledgeTags').value = '';
        document.getElementById('knowledgeFileKey').value = '';
        document.getElementById('knowledgeFileInput').value = '';
        document.getElementById('knowledgeParseStatus').style.display = 'none';
    }

    function deleteKnowledgeDoc(id) {
        if (!confirm('确定删除该知识文档吗？')) return;
        authFetch(`/api/knowledge/documents/${id}`, { method: 'DELETE' })
            .then(() => loadKnowledgeDocs(1))
            .catch(() => alert('删除失败'));
    }

    function searchKnowledge() {
        const query = document.getElementById('knowledgeSearchQuery').value.trim();
        if (!query) return;
        authFetch('/api/knowledge/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, topK: ragTopK })
        }).then(r => r.json()).then(list => {
            const box = document.getElementById('knowledgeSearchResult');
            if (!Array.isArray(list) || list.length === 0) {
                box.innerHTML = `<div class="small" style="color:var(--warm-400);">未命中知识片段</div>`;
                return;
            }
            box.innerHTML = list.map(ref => `
                <div class="knowledge-item">
                    <div class="small fw-semibold" style="color:var(--warm-800);">${escapeHtml(ref.title || '未命名文档')} <span style="color:var(--warm-400);">score:${ref.score ?? '-'}</span></div>
                    <div class="small" style="color:var(--warm-500);">${escapeHtml(ref.snippet || '')}</div>
                </div>
            `).join('');
        });
    }

    function bindRagSettings() {
        ragSwitch.checked = ragEnabled;
        ragTopKSelect.value = String(ragTopK);
        ragSwitch.addEventListener('change', () => {
            ragEnabled = ragSwitch.checked;
            localStorage.setItem('ai_studio_rag_enabled', String(ragEnabled));
        });
        ragTopKSelect.addEventListener('change', () => {
            ragTopK = Number(ragTopKSelect.value) || 3;
            localStorage.setItem('ai_studio_rag_topk', String(ragTopK));
        });
    }

    setSendButtonMode(false);
    bindRagSettings();
    sendButton.onclick = sendMessage;
    messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

    initAuth().then(authed => {
        if (authed) {
            afterAuthReady();
        }
    });
</script>
</body>
</html>
