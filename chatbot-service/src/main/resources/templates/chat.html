    function normalizeLocalRelativePath(path) {
        const normalized = String(path || '').replace(/\\/g, '/').replace(/^\/+/, '');
        if (!normalized || normalized.includes('..') || normalized.includes(':')) {
            throw new Error('Unsafe local path');
        }
        const parts = normalized.split('/').filter(Boolean);
        if (parts.some(part => part === '.')) {
            throw new Error('Unsafe local path');
        }
        return parts.join('/');
    }

    function localFileExtension(path) {
        const name = String(path || '').toLowerCase();
        const idx = name.lastIndexOf('.');
        return idx >= 0 ? name.substring(idx) : '';
    }

    function localFileName(path) {
        const normalized = String(path || '').replace(/\\/g, '/');
        const parts = normalized.split('/').filter(Boolean);
        return parts.length === 0 ? '' : parts[parts.length - 1];
    }

    function isSkippedLocalWorkspacePath(relativePath) {
        return String(relativePath || '')
            .replace(/\\/g, '/')
            .split('/')
            .filter(Boolean)
            .some(part => LOCAL_WORKSPACE_SKIP_DIRS.has(part));
    }

    function isAllowedLocalWorkspaceFile(relativePath, file) {
        if (!file || file.size > LOCAL_WORKSPACE_MAX_FILE_SIZE) return false;
        if (isSkippedLocalWorkspacePath(relativePath)) return false;
        return LOCAL_WORKSPACE_ALLOWED_EXTENSIONS.has(localFileExtension(relativePath))
            || LOCAL_WORKSPACE_ALLOWED_FILENAMES.has(localFileName(relativePath));
    }

    function contentTypeForLocalPath(path) {
        const ext = localFileExtension(path);
        if (ext === '.md') return 'text/markdown';
        if (ext === '.json') return 'application/json';
        if (ext === '.html') return 'text/html';
        if (ext === '.css') return 'text/css';
        if (ext === '.js' || ext === '.ts') return 'text/javascript';
        if (ext === '.xml') return 'application/xml';
        return 'text/plain';
    }

    async function ensureWorkspaceReady() {
        if (!currentUser || !activeSessionId) {
            throw new Error('Please login and open a chat session first.');
        }
        const response = await authFetch(`/api/agent/workspaces/current?sessionId=${encodeURIComponent(activeSessionId)}`);
        const result = await response.json();
        if (!result.success || !result.workspace || !result.workspace.id) {
            throw new Error(result.error || 'Workspace is unavailable.');
        }
        currentWorkspaceId = result.workspace.id;
        return result.workspace;
    }

    async function scanLocalDirectory(directoryHandle, prefix, files, depth) {
        if (depth > LOCAL_WORKSPACE_MAX_DEPTH || files.length >= LOCAL_WORKSPACE_MAX_FILES) return;
        for await (const [name, handle] of directoryHandle.entries()) {
            if (files.length >= LOCAL_WORKSPACE_MAX_FILES) return;
            if (handle.kind === 'directory') {
                if (LOCAL_WORKSPACE_SKIP_DIRS.has(name)) continue;
                await scanLocalDirectory(handle, `${prefix}${name}/`, files, depth + 1);
                continue;
            }
            if (handle.kind !== 'file') continue;
            const relativePath = normalizeLocalRelativePath(`${prefix}${name}`);
            const file = await handle.getFile();
            if (!isAllowedLocalWorkspaceFile(relativePath, file)) continue;
            files.push({ relativePath, file, handle });
            localWorkspaceFileHandles.set(relativePath, handle);
        }
    }

    async function createOrUpdateWorkspaceFile(workspaceId, relativePath, content, contentType) {
        const response = await authFetch(`/api/agent/workspaces/${workspaceId}/files`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                relativePath,
                content,
                contentType,
                overwrite: true
            })
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.error || `Sync failed: ${relativePath}`);
        return result.file;
    }

    async function openLocalFolderWorkspace() {
        if (!window.showDirectoryPicker) {
            await importLocalFolderReadOnly();
            return;
        }
        try {
            const workspace = await ensureWorkspaceReady();
            const directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            localDirectoryHandle = directoryHandle;
            localWorkspaceFileHandles = new Map();
            const files = [];
            await scanLocalDirectory(directoryHandle, '', files, 0);
            if (files.length === 0) {
                alert('No supported text files found in this folder.');
                return;
            }
            for (const item of files) {
                const content = await item.file.text();
                await createOrUpdateWorkspaceFile(workspace.id, item.relativePath, content, contentTypeForLocalPath(item.relativePath));
            }
            await openWorkspaceModal();
            const metaEl = document.getElementById('workspaceMeta');
            if (metaEl) {
                metaEl.textContent = `${workspace.name || 'Agent Workspace'} · local folder linked: ${directoryHandle.name} · ${files.length} files synced`;
            }
            alert(`Local folder synced into workspace: ${files.length} files.`);
        } catch (e) {
            alert(e && e.message ? e.message : 'Local folder sync failed.');
        }
    }

    async function importLocalFolderReadOnly() {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.webkitdirectory = true;
        input.style.display = 'none';
        document.body.appendChild(input);
        input.onchange = async () => {
            try {
                const workspace = await ensureWorkspaceReady();
                const selected = Array.from(input.files || []);
                const accepted = [];
                for (const file of selected) {
                    const rawPath = file.webkitRelativePath || file.name;
                    const parts = rawPath.split('/').filter(Boolean);
                    const relativePath = normalizeLocalRelativePath(parts.length > 1 ? parts.slice(1).join('/') : rawPath);
                    if (accepted.length >= LOCAL_WORKSPACE_MAX_FILES) break;
                    if (!isAllowedLocalWorkspaceFile(relativePath, file)) continue;
                    accepted.push({ relativePath, file });
                }
                if (accepted.length === 0) {
                    alert('No supported text files found in this folder.');
                    return;
                }
                localDirectoryHandle = null;
                localWorkspaceFileHandles = new Map();
                for (const item of accepted) {
                    const content = await item.file.text();
                    await createOrUpdateWorkspaceFile(workspace.id, item.relativePath, content, contentTypeForLocalPath(item.relativePath));
                }
                await openWorkspaceModal();
                alert(`Local folder imported into workspace: ${accepted.length} files. Direct write-back requires HTTPS or localhost.`);
            } catch (e) {
                alert(e && e.message ? e.message : 'Local folder import failed.');
            } finally {
                input.remove();
            }
        };
        input.click();
    }

    async function requestLocalWritePermission() {
        if (!localDirectoryHandle) throw new Error('Open a local folder workspace first.');
        if (typeof localDirectoryHandle.queryPermission !== 'function') return;
        const current = await localDirectoryHandle.queryPermission({ mode: 'readwrite' });
        if (current === 'granted') return;
        const requested = await localDirectoryHandle.requestPermission({ mode: 'readwrite' });
        if (requested !== 'granted') {
            throw new Error('Local folder write permission was not granted.');
        }
    }

    async function getOrCreateLocalFileHandle(relativePath) {
        const safePath = normalizeLocalRelativePath(relativePath);
        if (localWorkspaceFileHandles.has(safePath)) {
            return localWorkspaceFileHandles.get(safePath);
        }
        let directory = localDirectoryHandle;
        const parts = safePath.split('/');
        for (let i = 0; i < parts.length - 1; i++) {
            directory = await directory.getDirectoryHandle(parts[i], { create: true });
        }
        const fileHandle = await directory.getFileHandle(parts[parts.length - 1], { create: true });
        localWorkspaceFileHandles.set(safePath, fileHandle);
        return fileHandle;
    }

    async function writeWorkspaceFileToLocal(workspaceId, encodedPath, quiet = false) {
        if (!workspaceId || !encodedPath) return;
        try {
            await requestLocalWritePermission();
            const path = normalizeLocalRelativePath(decodeURIComponent(encodedPath));
            const response = await authFetch(`/api/agent/workspaces/${workspaceId}/files/content?path=${encodeURIComponent(path)}`);
            const result = await response.json();
            if (!result.success) throw new Error(result.error || 'Read workspace file failed.');
            const fileHandle = await getOrCreateLocalFileHandle(path);
            const writable = await fileHandle.createWritable();
            await writable.write((result.file && result.file.content) || '');
            await writable.close();
            if (!quiet) alert(`Written to local folder: ${path}`);
            return path;
        } catch (e) {
            if (!quiet) alert(e && e.message ? e.message : 'Write to local folder failed.');
            if (quiet) throw e;
        }
    }

    async function syncWorkspaceToLocal() {
        try {
            await requestLocalWritePermission();
            const workspaceId = currentWorkspaceId || (await ensureWorkspaceReady()).id;
            const response = await authFetch(`/api/agent/workspaces/current?sessionId=${encodeURIComponent(activeSessionId)}`);
            const result = await response.json();
            if (!result.success) throw new Error(result.error || 'Load workspace failed.');
            const files = result.files || [];
            let count = 0;
            for (const file of files) {
                if (!file.relativePath) continue;
                await writeWorkspaceFileToLocal(workspaceId, encodeURIComponent(file.relativePath), true);
                count++;
            }
            alert(`Workspace files written to local folder: ${count}`);
        } catch (e) {
            alert(e && e.message ? e.message : 'Sync to local folder failed.');
        }
    }

    function workspaceFileIcon(path) {
        const ext = localFileExtension(path);
        if (['.java', '.js', '.ts', '.jsx', '.tsx', '.py', '.go', '.rs', '.cpp', '.c', '.cs', '.php', '.rb', '.kt', '.vue'].includes(ext)) {
            return 'bi-file-earmark-code';
        }
        if (['.yml', '.yaml', '.properties', '.json', '.xml', '.toml', '.ini', '.conf'].includes(ext)) {
            return 'bi-file-earmark-ruled';
        }
        if (ext === '.md') return 'bi-markdown';
        return 'bi-file-earmark-text';
    }

    function buildWorkspaceTree(files) {
        const root = { type: 'dir', name: '', children: new Map() };
        (files || []).forEach(file => {
            const relativePath = normalizeLocalRelativePath(file.relativePath || file.fileName || '');
            const parts = relativePath.split('/');
            let node = root;
            for (let i = 0; i < parts.length; i++) {
                const name = parts[i];
                const isFile = i === parts.length - 1;
                if (!node.children.has(name)) {
                    node.children.set(name, isFile
                        ? { type: 'file', name, path: relativePath, file }
                        : { type: 'dir', name, children: new Map() });
                }
                node = node.children.get(name);
                if (isFile) {
                    node.file = file;
                    node.path = relativePath;
                }
            }
        });
        return root;
    }

    function sortedWorkspaceChildren(node) {
        return Array.from(node.children.values()).sort((a, b) => {
            if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
            return a.name.localeCompare(b.name);
        });
    }

    function renderWorkspaceTreeNode(node) {
        if (node.type === 'file') {
            const encodedPath = encodeURIComponent(node.path);
            const active = activeWorkspacePath === node.path ? ' active' : '';
            return `<button class="workspace-tree-file${active}" onclick="previewWorkspaceFile('${encodedPath}')">
                <i class="bi ${workspaceFileIcon(node.path)}"></i>
                <span class="workspace-tree-name" title="${escapeHtml(node.path)}">${escapeHtml(node.name)}</span>
            </button>`;
        }
        return `<details class="workspace-tree-dir" open>
            <summary><i class="bi bi-folder2-open"></i><span class="workspace-tree-name">${escapeHtml(node.name)}</span></summary>
            <div class="workspace-tree-children">${sortedWorkspaceChildren(node).map(renderWorkspaceTreeNode).join('')}</div>
        </details>`;
    }

    function renderWorkspaceBrowser(files) {
        workspaceFileMap = new Map();
        (files || []).forEach(file => {
            if (file.relativePath) workspaceFileMap.set(file.relativePath, file);
        });
        if (!activeWorkspacePath || !workspaceFileMap.has(activeWorkspacePath)) {
            activeWorkspacePath = files && files.length > 0 ? files[0].relativePath : '';
        }
        const tree = buildWorkspaceTree(files || []);
        const treeHtml = sortedWorkspaceChildren(tree).map(renderWorkspaceTreeNode).join('');
        return `<div class="workspace-browser">
            <div class="workspace-tree-pane">${treeHtml}</div>
            <div class="workspace-detail-pane" id="workspaceFileDetail"></div>
        </div>`;
    }

            const result = await response.json();

    async function confirmAgentAction(actionId, button) {

    async function sendMessage() {
        if (!currentUser) {
            clearAuthState();
            window.location.replace('/login');
            return;
        }
        if (isStreaming) {
            if (currentAbortController) currentAbortController.abort();
            return;
        }

        const msg = messageInput.value.trim();
        const hasImage = selectedImageFile !== null;
        if (!msg && !hasImage) return;
        if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();
        clearReferences();

        // 构建用户消息显示内容（含图片预览）
        let userHtml = '';
        if (hasImage) {
            const previewUrl = URL.createObjectURL(selectedImageFile);
            userHtml += `<img src="${previewUrl}" class="msg-image" alt="uploaded image"><br>`;
        }
        if (msg) userHtml += escapeHtml(msg);
        else userHtml += '<span style="color:var(--warm-400);" class="small">[图片]</span>';

        messageInput.value = '';
        addMessage(userHtml, 'user', '', true);

        const messageId = 'ai_' + Date.now();
        const loadingHtml = `<div class="d-flex align-items-center gap-3"><div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div><span class="small" style="color:var(--warm-400);">AI 正在思考中...</span></div>`;
        addMessage(loadingHtml, 'bot', messageId);

        const targetBubble = document.getElementById(messageId);
        currentTargetBubble = targetBubble;
        currentAbortController = new AbortController();
        hasStreamContent = false;
        isStreaming = true;
        setSendButtonMode(true);

        try {
            let fetchOptions;
            const modelVal = document.getElementById('modelSelect').value;
            const agentMode = modelVal === 'agent' && !hasImage;
            const requestModel = modelVal === 'agent' ? 'deepseek' : modelVal;

            if (hasImage) {
                // 新方式：先上传图片到 file-service，再用 fileKey 调用聊天接口
                const imageFileKey = await uploadToFileService(selectedImageFile);
                if (!imageFileKey) {
                    throw new Error('图片上传失败，请重试');
                }
                clearImage();
                fetchOptions = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
                    signal: currentAbortController.signal,
                    body: JSON.stringify({
                        message: msg || '请描述这张图片',
                        imageFileKey: imageFileKey,
                        sessionId: activeSessionId,
                        model: requestModel,
                        useRag: ragEnabled,
                        ragTopK: ragTopK
                    })
                };
            } else {
                fetchOptions = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
                    signal: currentAbortController.signal,
                    body: JSON.stringify({
                        message: msg,
                        sessionId: activeSessionId,
                        model: requestModel,
                        useRag: ragEnabled,
                        ragTopK: ragTopK
                    })
                };
            }

            const endpoint = hasImage ? '/api/chat/stream/filekey' : (agentMode ? '/api/chat/agent/stream' : '/api/chat/stream');
            const response = await authFetch(endpoint, fetchOptions);

            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('text/event-stream')) {
                const fallback = await response.text();
                throw new Error(`后端未返回SSE流，content-type=${contentType || 'unknown'}，body=${fallback}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            const streamState = { fullText: '', toolEvents: [], pendingActions: [], documentCards: [], workspaceCards: [] };
            let buffer = '';
            let currentEventName = 'message';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('event:')) {
                        currentEventName = trimmedLine.substring(6).trim() || 'message';
                        continue;
                    }
                    if (!trimmedLine.startsWith('data:')) continue;
                    const data = trimmedLine.substring(5).trim();
                    if (data === "[DONE]") continue;

                    try {
                        const json = JSON.parse(data);
                        if (handleAgentStreamEvent(currentEventName, json, streamState, targetBubble, loadingHtml)) {
                            currentEventName = 'message';
                            continue;
                        }
                        // RAG 引用
                        if (Array.isArray(json.references)) {
                            renderReferences(json.references);
                            currentEventName = 'message';
                            continue;
                        }
                        if (json.status === 'queued') {
                            renderAssistantBubble(targetBubble, streamState.fullText, streamState.toolEvents, streamState.pendingActions, `<div class="d-flex align-items-center gap-3">
                                <div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div>
                                <span class="small" style="color:var(--warm-400);">${json.message || 'Queued...'}</span></div>`, streamState.documentCards, streamState.workspaceCards);
                            currentEventName = 'message';
                            continue;
                        }
                        if (json.status === 'processing') {
                            renderAssistantBubble(targetBubble, streamState.fullText, streamState.toolEvents, streamState.pendingActions, `<div class="d-flex align-items-center gap-3">
                                <div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div>
                                <span class="small" style="color:var(--warm-400);">AI is thinking...</span></div>`, streamState.documentCards, streamState.workspaceCards);
                            currentEventName = 'message';
                            continue;
                        }
                        /*
                        // 排队状态
                        if (json.status === 'queued') {
                            targetBubble.innerHTML = `<div class="d-flex align-items-center gap-3">
                                <div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div>
                                <span class="small" style="color:var(--warm-400);">${json.message || 'AI 正忙，排队等待中…'}</span></div>`;
                            continue;
                        }
                        if (json.status === 'processing') {
                            targetBubble.innerHTML = `<div class="d-flex align-items-center gap-3">
                                <div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div>
                                <span class="small" style="color:var(--warm-400);">AI 正在思考中...</span></div>`;
                            continue;
                        }
                        // 错误
                        */
                        if (json.error) {
                            targetBubble.innerHTML = `<div class='d-flex align-items-center gap-2' style='color:#dc503c;'>
                                <i class="bi bi-exclamation-triangle"></i>${json.error}</div>`;
                            currentEventName = 'message';
                            continue;
                        }
                        // 正常内容
                        if (json.content && json.content !== "[DONE]") {
                            hasStreamContent = true;
                            streamState.fullText += json.content;
                            renderAssistantBubble(targetBubble, streamState.fullText, streamState.toolEvents, streamState.pendingActions, loadingHtml, streamState.documentCards, streamState.workspaceCards);
                            currentEventName = 'message';
                        }
                    } catch (e) { }
                }
            }
            loadStats();
        } catch (e) {
            if (e && e.name === 'AbortError') {
                if (!hasStreamContent && currentTargetBubble) {
                    // User stopped before the first chunk arrived (thinking state).
                    currentTargetBubble.innerHTML = "<span style='color:var(--warm-400);'>已停止输出。</span>";
                } else if (!targetBubble.innerText.trim()) {
                    targetBubble.innerHTML = "<span style='color:var(--warm-400);'>已停止输出。</span>";
                }
            } else {
                targetBubble.innerHTML = `<span style='color:#dc503c;'>${e && e.message ? e.message : '连接中断，请检查状态。'}</span>`;
            }
        } finally {
            isStreaming = false;
            currentAbortController = null;
            hasStreamContent = false;
            currentTargetBubble = null;
            setSendButtonMode(false);
        }
    }

    function addMessage(content, type, id = '', rawHtml = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        let displayContent;
        if (rawHtml) {
            displayContent = content;
        } else if (type === 'bot' && (!id || !id.startsWith('ai_'))) {
            displayContent = sanitizeHtml(marked.parse(content));
        } else {
            displayContent = content;
        }
        div.innerHTML = `<div class="bubble" ${id ? `id="${id}"` : ''}>${displayContent}</div>`;
        messagesContainer.appendChild(div);
        if(type === 'bot') div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        scrollToBottom();
    }

    function scrollToBottom() { messagesContainer.scrollTop = messagesContainer.scrollHeight; }

    function sanitizeHtml(html) {
        if (window.DOMPurify) {
            return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
        }
        return escapeHtml(String(html || ''));
    }

    function deleteSession(event, sessionId, currentPage) {
        event.stopPropagation(); // 防止触发父元素的切换会话点击事件
        if (!confirm('确定要删除这个会话及其所有聊天记录吗？此操作不可撤销。')) return;

        authFetch(`/api/chat/${encodeURIComponent(sessionId)}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    // 如果删除的是当前正在聊天的会话，则开启新对话
                    if (sessionId === activeSessionId) {
                        startNewChat();
                    } else {
                        fetchRecords(currentPage); // 刷新列表
                        loadStats(); // 刷新统计
                    }
                } else {
                    alert('删除失败：' + data.message);
                }
            })
            .catch(err => alert('网络错误，请稍后重试'));
    }

    function normalizeIndexStatus(status) {
        const value = (status || 'UNKNOWN').toUpperCase();
        const labels = {
            PENDING_INDEX: '待索引',
            INDEXING: '索引中',
            INDEXED: '已索引',
            INDEX_FAILED: '索引失败',
            VECTOR_DISABLED: '向量关闭',
            INDEX_SKIPPED: '已跳过',
            UNKNOWN: '未知'
        };
        const classes = {
            PENDING_INDEX: 'pending-index',
            INDEXING: 'indexing',
            INDEXED: 'indexed',
            INDEX_FAILED: 'failed',
            VECTOR_DISABLED: 'disabled',
            INDEX_SKIPPED: 'disabled',
            UNKNOWN: 'disabled'
        };
        const icons = {
            PENDING_INDEX: 'bi-clock',
            INDEXING: 'bi-arrow-repeat',
            INDEXED: 'bi-check-circle',
            INDEX_FAILED: 'bi-exclamation-triangle',
            VECTOR_DISABLED: 'bi-dash-circle',
            INDEX_SKIPPED: 'bi-skip-forward',
            UNKNOWN: 'bi-question-circle'
        };
        return {
            raw: value,
            label: labels[value] || value,
            className: classes[value] || 'disabled',
            icon: icons[value] || 'bi-question-circle'
        };
    }

    function renderIndexStatus(status, error) {
        const info = normalizeIndexStatus(status);
        const title = error ? ` title="${escapeHtml(error)}"` : '';
        return `<span class="index-status ${info.className}"${title}><i class="bi ${info.icon}"></i>${escapeHtml(info.label)}</span>`;
    }

    function formatKnowledgeTime(value) {
        if (!value) return '';
        try {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace('T', ' ');
            return date.toLocaleString('zh-CN', { hour12: false });
        } catch (e) {
            return String(value).replace('T', ' ');
        }
    }

    function renderKnowledgeMeta(doc) {
        const tags = doc.tags || '无';
        const indexedTime = formatKnowledgeTime(doc.indexedTime);
        const status = normalizeIndexStatus(doc.indexStatus);
        const parts = [
            `标签：${escapeHtml(tags)}`,
            `状态：${escapeHtml(status.label)}`
        ];
        if (indexedTime) {
            parts.push(`索引时间：${escapeHtml(indexedTime)}`);
        }
        return `<div class="knowledge-meta-line">${parts.map(item => `<span>${item}</span>`).join('<span>·</span>')}</div>`;
    }

    function renderKnowledgeError(error) {
        if (!error) return '';
        return `<div class="knowledge-error"><i class="bi bi-exclamation-triangle me-1"></i>${escapeHtml(error)}</div>`;
    }

    async function reindexKnowledgeDocs() {
        const btn = document.getElementById('knowledgeReindexBtn');
        const statusEl = document.getElementById('knowledgeReindexStatus');
        if (!btn || !statusEl) return;
        btn.disabled = true;
        const oldText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>重建中';
        statusEl.textContent = '正在提交当前用户的知识库文档向量索引...';
        try {
            const response = await authFetch('/api/knowledge/reindex', { method: 'POST' });
            const result = await response.json();
            if (!response.ok || result.success === false) {
                throw new Error(result.message || result.error || '重建失败');
            }
            statusEl.textContent = `已提交 ${result.requested ?? 0} 个文档，向量索引：${result.vectorEnabled ? '已启用' : '未启用'}`;
            loadKnowledgeDocs(1);
            setTimeout(() => loadKnowledgeDocs(1), 2500);
        } catch (error) {
            statusEl.textContent = `重建失败：${error.message || '未知错误'}`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldText;
        }
    }

            body: JSON.stringify(body)
        }).then(r => r.json()).then(() => {

        }).catch(() => alert('新增知识失败'));

    async function uploadKnowledgeFile() {
        const fileInput = document.getElementById('knowledgeFileInput');
        const file = fileInput.files[0];
        if (!file) return;

        const statusEl = document.getElementById('knowledgeParseStatus');
        statusEl.style.display = 'block';
        statusEl.innerHTML = '<span class="small" style="color:var(--accent);">正在解析文件...</span>';

        try {
            const formData = new FormData();
            formData.append('file', file);
            const resp = await fileServiceFetch(`${FILE_SERVICE_BASE}/upload/knowledge`, {
                method: 'POST',
                body: formData
            });
            const result = await resp.json();
            if (result.success && result.data) {
                document.getElementById('knowledgeContent').value = result.data.parsedContent;
                document.getElementById('knowledgeFileKey').value = result.data.fileKey;
                if (!document.getElementById('knowledgeTitle').value) {
                    document.getElementById('knowledgeTitle').value = result.data.originalName
                        .replace(/\.(pdf|docx|txt|md)$/i, '');
                }
                statusEl.innerHTML = '<span class="small" style="color:#4ade80;">解析成功! ' +
                    result.data.originalName + ' (' + result.data.charCount + ' 字符)</span>';
            } else {
                statusEl.innerHTML = '<span class="small" style="color:#dc503c;">解析失败: ' +
                    (result.error || '未知错误') + '</span>';
            }
        } catch (e) {
            statusEl.innerHTML = '<span class="small" style="color:#dc503c;">网络错误，请重试</span>';
            console.error('文档上传失败:', e);
        }
    }

        document.getElementById('knowledgeFileKey').value = '';

    function deleteKnowledgeDoc(id) {
        if (!confirm('确定删除该知识文档吗？')) return;
        authFetch(`/api/knowledge/documents/${id}`, { method: 'DELETE' })
            .then(() => loadKnowledgeDocs(1))
            .catch(() => alert('删除失败'));
    }

    function searchKnowledge() {
        const query = document.getElementById('knowledgeSearchQuery').value.trim();
        if (!query) return;
        authFetch('/api/knowledge/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, topK: ragTopK })
        }).then(r => r.json()).then(list => {
            const box = document.getElementById('knowledgeSearchResult');
            if (!Array.isArray(list) || list.length === 0) {
                box.innerHTML = `<div class="small" style="color:var(--warm-400);">未命中知识片段</div>`;
                return;
            }
            box.innerHTML = list.map(ref => `
                <div class="knowledge-item">
                    <div class="small fw-semibold" style="color:var(--warm-800);">${escapeHtml(ref.title || '未命名文档')} <span style="color:var(--warm-400);">score:${ref.score ?? '-'}</span></div>
                    <div class="small" style="color:var(--warm-500);">${escapeHtml(ref.snippet || '')}</div>
                </div>
            `).join('');
        });
    }

    function bindRagSettings() {
        ragSwitch.checked = ragEnabled;
        ragTopKSelect.value = String(ragTopK);
        ragSwitch.addEventListener('change', () => {
            ragEnabled = ragSwitch.checked;
            localStorage.setItem('ai_studio_rag_enabled', String(ragEnabled));
        });
        ragTopKSelect.addEventListener('change', () => {
            ragTopK = Number(ragTopKSelect.value) || 3;
            localStorage.setItem('ai_studio_rag_topk', String(ragTopK));
        });
    }

    setSendButtonMode(false);
    bindRagSettings();
    sendButton.onclick = sendMessage;
    messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

    initAuth().then(authed => {
        if (authed) {
            afterAuthReady();
        }
    });
</script>
</body>
</html>
