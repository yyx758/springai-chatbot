<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 管理后台</title>
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        :root {
            --primary-black: #111827;
            --primary-white: #ffffff;
            --bg-color: #f8f9fa;
            --border-light: rgba(0, 0, 0, 0.06);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(120deg, #ffffff, #f1f5f9, #ffffff, #e2e8f0);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .navbar-custom {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem;
        }

        .main-content { max-width: 1400px; margin: 2rem auto; padding: 0 2rem 4rem; }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }

        .data-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }

        .data-card .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-light);
            padding: 1.2rem 1.5rem;
            font-weight: 600;
        }

        .table-custom { margin-bottom: 0; }
        .table-custom th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 1.2rem;
        }
        .table-custom td {
            padding: 0.9rem 1.2rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-light);
        }

        .role-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }
        .role-ADMIN { background: #111827; color: #fff; }
        .role-USER { background: #f1f5f9; color: #475569; }

        .nav-pills .nav-link {
            border-radius: 12px;
            padding: 0.7rem 1.4rem;
            color: #64748b;
            font-weight: 500;
            margin-right: 0.5rem;
        }
        .nav-pills .nav-link.active { background: var(--primary-black); color: #fff; }

        .pagination-sm .page-link { border-radius: 10px; margin: 0 2px; border: none; color: #333; }
        .pagination-sm .active .page-link { background: var(--primary-black); color: #fff; border-radius: 10px; }

        .form-select-sm { border-radius: 10px; border: 1px solid var(--border-light); font-size: 0.82rem; }
        .toast-custom {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
            background: var(--primary-black); color: #fff;
            padding: 0.8rem 1.5rem; border-radius: 14px; font-size: 0.9rem;
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease;
        }
        .toast-custom.show { opacity: 1; transform: translateY(0); }
        .toast-custom.error { background: #dc3545; }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<nav class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-shield-lock" style="font-size: 1.4rem;"></i>
        <h5 class="mb-0 fw-bold">AI Studio 管理后台</h5>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span id="adminName" class="small text-muted"></span>
        <a href="http://localhost:8081/admin/files" target="_blank" class="btn btn-sm btn-outline-dark">
            <i class="bi bi-folder me-1"></i>文件管理
        </a>
        <a href="/chat" class="btn btn-sm btn-outline-dark">返回聊天</a>
        <button class="btn btn-sm btn-outline-danger" onclick="doLogout()">退出</button>
    </div>
</nav>

<main class="main-content">

    <ul class="nav nav-pills mb-4" id="adminTabs">
        <li class="nav-item">
            <button class="nav-link active" data-tab="dashboard" onclick="switchTab('dashboard')">
                <i class="bi bi-speedometer2 me-1"></i>仪表盘
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="users" onclick="switchTab('users')">
                <i class="bi bi-people me-1"></i>用户管理
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="documents" onclick="switchTab('documents')">
                <i class="bi bi-files me-1"></i>文档管理
            </button>
        </li>
    </ul>

    <div id="tab-dashboard">
        <div class="row g-4 mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: #dbeafe; color: #2563eb;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <div class="small text-muted">用户总数</div>
                        <div class="fw-bold fs-4" id="statUsers">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: #d1fae5; color: #059669;">
                        <i class="bi bi-chat-dots-fill"></i>
                    </div>
                    <div>
                        <div class="small text-muted">总对话数</div>
                        <div class="fw-bold fs-4" id="statChats">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: #fef3c7; color: #d97706;">
                        <i class="bi bi-file-text-fill"></i>
                    </div>
                    <div>
                        <div class="small text-muted">知识文档</div>
                        <div class="fw-bold fs-4" id="statDocs">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-users" class="d-none">
        <div class="data-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-people me-2"></i>用户列表</span>
                <button class="btn btn-sm btn-outline-dark" onclick="loadUsers(userPage)"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
            </div>
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>昵称</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
            <div class="p-3 d-flex justify-content-center">
                <nav><ul class="pagination pagination-sm mb-0" id="userPagination"></ul></nav>
            </div>
        </div>
    </div>

    <div id="tab-documents" class="d-none">
        <div class="data-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-files me-2"></i>全部文档</span>
                <button class="btn btn-sm btn-outline-dark" onclick="loadDocs(docPage)"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
            </div>
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>所属用户ID</th>
                            <th>标签</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="docTableBody"></tbody>
                </table>
            </div>
            <div class="p-3 d-flex justify-content-center">
                <nav><ul class="pagination pagination-sm mb-0" id="docPagination"></ul></nav>
            </div>
        </div>
    </div>

</main>

<div class="toast-custom" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let authToken = localStorage.getItem('ai_studio_token') || '';
    let currentUser = JSON.parse(localStorage.getItem('ai_studio_user') || 'null');
    let userPage = 1, docPage = 1;
    let refreshPromise = null;

    function getAuthHeaders(extra = {}) {
        return Object.assign({}, extra, authToken ? { 'Authorization': `Bearer ${authToken}` } : {});
    }

    async function tryRefreshToken() {
        const rt = localStorage.getItem('ai_studio_refresh_token');
        if (!rt) return false;
        if (refreshPromise) { await refreshPromise; return true; }
        try {
            refreshPromise = (async () => {
                const resp = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: rt })
                });
                if (!resp.ok) { doLogout(); throw new Error('refresh failed'); }
                const data = await resp.json();
                if (data.token) localStorage.setItem('ai_studio_token', data.token);
                if (data.refreshToken) localStorage.setItem('ai_studio_refresh_token', data.refreshToken);
                authToken = data.token || authToken;
            })();
            await refreshPromise;
            return true;
        } catch { return false; }
        finally { refreshPromise = null; }
    }

    async function authFetch(url, options = {}) {
        const merged = Object.assign({}, options);
        merged.headers = getAuthHeaders(options.headers || {});
        let resp = await fetch(url, merged);
        if (resp.status === 401) {
            const refreshed = await tryRefreshToken();
            if (refreshed) {
                merged.headers = getAuthHeaders(options.headers || {});
                resp = await fetch(url, merged);
                if (resp.status !== 401) return resp;
            }
            window.location.href = '/login';
            throw new Error('未登录');
        }
        if (resp.status === 403) {
            showToast('权限不足，仅管理员可访问', true);
            doLogout();
            throw new Error('forbidden');
        }
        return resp;
    }

    function doLogout() {
        localStorage.removeItem('ai_studio_token');
        localStorage.removeItem('ai_studio_refresh_token');
        localStorage.removeItem('ai_studio_user');
        window.location.href = '/login';
    }

    function showToast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast-custom' + (isError ? ' error' : '') + ' show';
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function switchTab(name) {
        ['dashboard','users','documents'].forEach(t => {
            document.getElementById('tab-' + t).classList.toggle('d-none', t !== name);
        });
        document.querySelectorAll('#adminTabs .nav-link').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === name);
        });
        if (name === 'users') loadUsers(userPage);
        if (name === 'documents') loadDocs(docPage);
        if (name === 'dashboard') loadStats();
    }

    async function loadStats() {
        try {
            const resp = await authFetch('/api/admin/stats');
            const data = await resp.json();
            document.getElementById('statUsers').textContent = data.totalUsers ?? '-';
            document.getElementById('statChats').textContent = data.totalChats ?? '-';
            document.getElementById('statDocs').textContent = data.totalKnowledgeDocs ?? '-';
        } catch {}
    }

    async function loadUsers(page) {
        userPage = page;
        try {
            const resp = await authFetch(`/api/admin/users?page=${page}&size=15`);
            const data = await resp.json();
            const tbody = document.getElementById('userTableBody');
            const records = data.records || [];
            tbody.innerHTML = records.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td class="fw-semibold">${escapeHtml(u.username)}</td>
                    <td class="small">${escapeHtml(u.email || '-')}</td>
                    <td>${escapeHtml(u.displayName || '')}</td>
                    <td>
                        <select class="form-select form-select-sm role-select" style="width:100px;"
                                data-user-id="${u.id}"
                                onchange="changeRole(${u.id}, this.value)">
                            <option value="USER" ${u.role==='USER'?'selected':''}>USER</option>
                            <option value="ADMIN" ${u.role==='ADMIN'?'selected':''}>ADMIN</option>
                        </select>
                    </td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox"
                                   ${u.enabled ? 'checked' : ''}
                                   onchange="toggleEnabled(${u.id}, this.checked)">
                        </div>
                    </td>
                    <td class="small text-muted">${u.createdTime || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2"
                                onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')">
                            删除
                        </button>
                    </td>
                </tr>
            `).join('');
            renderPagination('userPagination', data.current, data.pages, loadUsers);
        } catch {}
    }

    async function changeRole(userId, newRole) {
        try {
            const resp = await authFetch(`/api/admin/users/${userId}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });
            const data = await resp.json();
            showToast(`用户角色已更新为 ${data.role}`);
            loadUsers(userPage);
        } catch { showToast('操作失败', true); }
    }

    async function toggleEnabled(userId, enabled) {
        try {
            await authFetch(`/api/admin/users/${userId}/enabled`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });
            showToast(enabled ? '用户已启用' : '用户已禁用');
        } catch { showToast('操作失败', true); loadUsers(userPage); }
    }

    async function deleteUser(userId, username) {
        if (!confirm(`确定要删除用户「${username}」(ID:${userId}) 吗？此操作不可撤销。`)) return;
        try {
            await authFetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
            showToast(`用户「${username}」已删除`);
            loadUsers(userPage);
            loadStats();
        } catch { showToast('删除失败', true); }
    }

    async function loadDocs(page) {
        docPage = page;
        try {
            const resp = await authFetch(`/api/admin/documents?page=${page}&size=15`);
            const data = await resp.json();
            const tbody = document.getElementById('docTableBody');
            const records = data.records || [];
            tbody.innerHTML = records.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td class="fw-semibold">${escapeHtml(d.title)}</td>
                    <td>${d.userId}</td>
                    <td><span class="badge bg-light text-dark">${escapeHtml(d.tags || '无')}</span></td>
                    <td>${d.enabled ? '<span class="text-success small">启用</span>' : '<span class="text-muted small">禁用</span>'}</td>
                    <td class="small text-muted">${d.createdTime || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2"
                                onclick="deleteDoc(${d.id}, '${escapeHtml(d.title)}')">
                            删除
                        </button>
                    </td>
                </tr>
            `).join('');
            renderPagination('docPagination', data.current, data.pages, loadDocs);
        } catch {}
    }

    async function deleteDoc(docId, title) {
        if (!confirm(`确定要删除文档「${title}」吗？`)) return;
        try {
            await authFetch(`/api/admin/documents/${docId}`, { method: 'DELETE' });
            showToast(`文档「${title}」已删除`);
            loadDocs(docPage);
            loadStats();
        } catch { showToast('删除失败', true); }
    }

    function renderPagination(id, curr, total, loadFn) {
        const list = document.getElementById(id);
        list.innerHTML = '';
        for (let i = 1; i <= total; i++) {
            list.innerHTML += `<li class="page-item ${i===curr?'active':''}">
                <a class="page-link" href="javascript:void(0)" onclick="${loadFn.name}(${i})">${i}</a>
            </li>`;
        }
    }

    function escapeHtml(text) {
        return (text || '').replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }

    async function init() {
        if (!authToken) { window.location.href = '/login'; return; }
        try {
            const resp = await authFetch('/api/auth/me');
            if (!resp.ok) { doLogout(); return; }
            const me = await resp.json();
            if (currentUser && currentUser.userId === me.userId) {
                document.getElementById('adminName').textContent = me.displayName || me.username;
            }
            if (me.role !== 'ADMIN') {
                showToast('权限不足，仅管理员可访问', true);
                window.location.href = '/chat';
                return;
            }
        } catch { doLogout(); return; }
        loadStats();
    }

    init();
</script>
</body>
</html>
