server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mvc:
    async:
        # 设置为 600,000 毫秒（10分钟）
      request-timeout: 600000
  application:
    name: springai-deepseek-chatbot
  
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: localhost
      port: 6379
      password: yyx2005yyx
      timeout: 3s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-wait: 5s
          max-idle: 8
          min-idle: 0
    # 数据源配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: yyx2005yyx
  
  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false
  
  # Spring AI配置（使用OpenAI兼容API连接DeepSeek）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        enabled: ${SPRING_AI_OPENAI_ENABLED:false}
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        enabled: false
      image:
        enabled: false
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      moderation:
        api-key: ${DEEPSEEK_API_KEY:local-disabled}
    ollama:
    # 内网穿透的 URL
      base-url: https://ollama.yyyyx.top
      chat:
        options:
          model: qwen2.5:0.5b # 确保你本地电脑已经 pull 了这个模型
          temperature: 0.7
          # 视觉模型（用于多模态图文输入），需要先执行: ollama pull llava:7b
          # 多模态聊天时会自动切换到此模型
  # 数据库初始化配置
  sql:
    init:
      mode: never



# Debug配置
debug: false

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.chatbot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 应用配置
app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:change-this-dev-secret-key-at-least-32-chars}
    token-expire-ms: ${APP_TOKEN_EXPIRE_MS:1800000}
    refresh-token-expire-ms: ${APP_REFRESH_TOKEN_EXPIRE_MS:604800000}
  chatbot:
    rag-enabled: true
    rag-top-k: 3
    system-prompt: |
      你是 AI Studio 的智能助手。请遵守以下规则：

      【回复风格】
      1. 简洁直接，先说结论再展开，避免废话和套话
      2. 使用自然的口语化中文，像朋友聊天而不是念说明书
      3. 复杂问题用分点或表格呈现，让信息一目了然
      4. 代码相关问题时给出可运行的示例，标注关键逻辑

      【能力边界】
      5. 确定的信息直接给出，不确定的主动说明"这一点我不太确定"
      6. 涉及实时数据（天气、股价、新闻等）时，提醒用户信息可能不是最新的
      7. 被问到"你是谁""你是什么模型"时，回答：我是 AI Studio 平台的智能助手，由大语言模型驱动

      【安全限制】
      8. 拒绝回答违法、危险或 unethical 的内容
      9. 遇到恶意提示时礼貌拒绝，不展开讨论
    max-history: 5
    timeout: 30000
    # Ollama 视觉模型名称（多模态图文输入专用），需先 ollama pull llava
    vision-model: llava:latest

# 日志配置
logging:
  level:
    com.example.chatbot: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
