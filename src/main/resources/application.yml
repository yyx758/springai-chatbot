server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mvc:
    async:
        # 设置为 600,000 毫秒（10分钟）
      request-timeout: 600000
  application:
    name: springai-deepseek-chatbot
  
  data:
    redis:
      host: localhost
      port: 6379
      password: yyx2005yyx
      timeout: 3s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
    # 数据源配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: yyx2005yyx
  
  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false
  
  # Spring AI配置（使用OpenAI兼容API连接DeepSeek）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        enabled: ${SPRING_AI_OPENAI_ENABLED:false}
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        enabled: false
      image:
        enabled: false
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      moderation:
        api-key: ${DEEPSEEK_API_KEY:local-disabled}
    ollama:
    # 内网穿透的 URL
      base-url: https://ollama.yyyyx.top
      chat:
        options:
          model: qwen2.5:0.5b # 确保你本地电脑已经 pull 了这个模型
          temperature: 0.7
  # 数据库初始化配置
  sql:
    init:
      mode: never



# Debug配置
debug: false

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.chatbot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 应用配置
app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:change-this-dev-secret-key-at-least-32-chars}
    token-expire-ms: ${APP_TOKEN_EXPIRE_MS:86400000}
  chatbot:
    rag-enabled: true
    rag-top-k: 3
    system-prompt: |
      你是一个专业的智能客服助手，名字叫小AI。请遵循以下规则：
      1. 始终保持友好、耐心和专业的态度
      2. 提供准确、有帮助的信息
      3. 如果不确定答案，请诚实说明并建议联系人工客服
      4. 回答要简洁明了，避免过于冗长
      5. 使用中文回复
    max-history: 5
    timeout: 30000

# 日志配置
logging:
  level:
    com.example.chatbot: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
