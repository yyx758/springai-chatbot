<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 极简智能助手</title>
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-black: #111827;
            --primary-white: #ffffff;
            --bg-color: #f8f9fa;
            --border-light: rgba(0, 0, 0, 0.06);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
        }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(120deg, #ffffff, #f1f5f9, #ffffff, #e2e8f0);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-app { display: flex; height: 100vh; max-width: 1600px; margin: 0 auto; background: transparent; }

        /* 侧边栏保持不变 */
        .sidebar {
            width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light); display: flex; flex-direction: column; padding: 2.5rem 1.5rem; z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; padding: 0 0.5rem; }
        .brand i { background: var(--primary-black); color: var(--primary-white); padding: 10px; border-radius: 12px; font-size: 1.2rem; }

        .nav-card {
            background: transparent; border: 1px solid transparent; border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
            cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; gap: 14px; color: #475569;
        }
        .nav-card:hover { background: var(--primary-white); border-color: var(--border-light); transform: translateX(5px); box-shadow: var(--glass-shadow); color: var(--primary-black); }

        /* 修改：聊天容器使用 Flex 布局控制显示区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .chat-header {
            padding: 1rem 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 20;
        }

        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem !important;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
            background-color: var(--primary-white);
            min-width: 140px;
        }

        /* 修改：聊天内容区域，通过 flex-grow 自动填满空间并处理滚动 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 15% 10rem; /* 底部预留足够空间给输入框 */
            scroll-behavior: smooth;
        }

        .message { margin-bottom: 2rem; display: flex; animation: springUp 0.4s forwards; opacity: 0; }
        @keyframes springUp { to { opacity: 1; transform: translateY(0); } from { transform: translateY(15px); } }

        .bubble { max-width: 85%; padding: 1rem 1.4rem; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; word-wrap: break-word; }
        .message.bot .bubble { background: var(--primary-white); border: 1px solid var(--border-light); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .message.user { flex-direction: row-reverse; }
        .message.user .bubble { background: var(--primary-black); color: var(--primary-white); }

        /* 修改：输入区域固定在底部，并增加遮罩感 */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 15% 2.5rem;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
            z-index: 15;
        }
        .input-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-light);
            border-radius: 24px; padding: 10px 14px 10px 24px; display: flex; align-items: center; box-shadow: var(--glass-shadow);
        }
        #messageInput { flex: 1; border: none; background: transparent; outline: none; font-size: 0.95rem; }
        .send-btn { background: var(--primary-black); color: var(--primary-white); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.05); background: #000; }

        .thinking-wave { display: flex; align-items: center; gap: 4px; height: 16px; }
        .thinking-wave .line { width: 3px; height: 100%; background: var(--primary-black); border-radius: 4px; animation: thinkWave 1s infinite alternate; }
        .thinking-wave .line:nth-child(2) { animation-delay: 0.2s; }
        .thinking-wave .line:nth-child(3) { animation-delay: 0.4s; }
        @keyframes thinkWave { from { height: 20%; opacity: 0.3; } to { height: 100%; opacity: 1; } }

        /* 代码块样式优化 */
        pre { background: #282c34; padding: 1rem; border-radius: 12px; margin: 1rem 0; overflow-x: auto; }
        code { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="main-app">
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-robot"></i>
            <h5 class="mb-0 fw-bold">AI Studio</h5>
        </div>
        <div class="nav-card" onclick="startNewChat()">
            <i class="bi bi-plus-circle"></i>
            <div>
                <div class="fw-bold small">开启新对话</div>
                <div class="text-muted" style="font-size: 0.7rem;">创建全新聊天窗口</div>
            </div>
        </div>
        <div class="nav-card" onclick="openRecordsModal()">
            <i class="bi bi-archive"></i>
            <div>
                <div class="fw-bold small">所有记录</div>
                <div class="text-muted" style="font-size: 0.7rem;">管理云端归档</div>
            </div>
        </div>
        <div class="mt-auto p-3 rounded-4" style="background: rgba(255,255,255,0.4); border: 1px solid rgba(0,0,0,0.03);">
            <div class="d-flex justify-content-between small text-muted">
                <span>总对话</span>
                <span id="totalChats" class="fw-bold text-dark">-</span>
            </div>
        </div>
    </aside>

    <main class="chat-container">
        <header class="chat-header">
            <div class="d-flex align-items-center">
                <span class="small fw-medium text-muted"><i class="bi bi-circle-fill text-success me-2" style="font-size: 8px;"></i>服务已连接</span>
            </div>
            <select class="form-select custom-select w-auto" id="modelSelect">
                <option value="deepseek">DeepSeek v3</option>
                <option value="ollama">Ollama Local</option>
            </select>
        </header>

        <section class="chat-messages" id="chatMessages">
            <div class="empty-view text-center mt-5" id="emptyState">
                <h4 class="fw-bold">您好</h4>
                <p class="text-muted">输入任何问题，让我们开始探索。</p>
            </div>
        </section>

        <footer class="input-area">
            <div class="input-box">
                <input type="text" id="messageInput" placeholder="输入消息并发射..." autocomplete="off">
                <button class="send-btn" id="sendButton"><i class="bi bi-arrow-up"></i></button>
            </div>
        </footer>
    </main>
</div>

<div class="modal fade" id="recordsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 rounded-5 shadow-lg">
            <div class="modal-header border-0 px-5 pt-5 pb-3">
                <h4 class="fw-bold mb-0">云端归档</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-5 py-4">
                <div id="recordsContent" class="row"></div>
            </div>
            <div class="modal-footer border-0 p-4 justify-content-center">
                <nav><ul class="pagination pagination-sm mb-0" id="paginationList"></ul></nav>
            </div>
        </div>
    </div>
</div>

<script>
    let userId = localStorage.getItem('ai_studio_user_id') || ('u' + Date.now().toString(36));
    localStorage.setItem('ai_studio_user_id', userId);

    let chatId = localStorage.getItem('ai_studio_chat_id') || ('c' + Date.now().toString(36));
    localStorage.setItem('ai_studio_chat_id', chatId);

    let activeSessionId = userId + '_' + chatId;

    const messagesContainer = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const emptyState = document.getElementById('emptyState');

    // 配置 Marked 渲染
    marked.setOptions({
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        },
        breaks: true
    });

    async function sendMessage() {
        const msg = messageInput.value.trim();
        if (!msg) return;
        if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();

        messageInput.value = '';
        addMessage(msg, 'user');

        const messageId = 'ai_' + Date.now();
        const loadingHtml = `<div class="d-flex align-items-center gap-3"><div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div><span class="text-muted small">AI 正在思考中...</span></div>`;
        addMessage(loadingHtml, 'bot', messageId);

        const targetBubble = document.getElementById(messageId);

        try {
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, sessionId: activeSessionId, model: document.getElementById('modelSelect').value })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (!trimmedLine.startsWith('data:')) continue;
                    const data = trimmedLine.substring(5).trim();

                    if (data === "[DONE]") break;

                    try {
                        const json = JSON.parse(data);
                        if (json.content) {
                            fullText += json.content;
                            targetBubble.innerHTML = marked.parse(fullText);
                            targetBubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            scrollToBottom();
                        }
                    } catch (e) { }
                }
            }
            loadStats();
        } catch (e) {
            targetBubble.innerHTML = "<span class='text-danger'>连接中断，请检查网络或服务器状态。</span>";
        }
    }

    // 修改 addMessage：统一处理渲染逻辑
    function addMessage(content, type, id = '') {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        // 如果是机器人，且没有传入 ID（说明是历史回显），则需要解析 Markdown
        const displayContent = (type === 'bot' && !id.startsWith('ai_')) ? marked.parse(content) : content;

        div.innerHTML = `<div class="bubble" ${id ? `id="${id}"` : ''}>${displayContent}</div>`;
        messagesContainer.appendChild(div);

        // 渲染完后，如果是机器人回复，立即高亮代码块
        if(type === 'bot') {
            div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        }

        scrollToBottom();
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 历史回显修复
    function loadSessionHistory() {
        fetch(`/api/chat/history/${encodeURIComponent(activeSessionId)}`)
            .then(r => r.json())
            .then(records => {
                if (records && records.length > 0) {
                    if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();
                    messagesContainer.innerHTML = '';
                    records.forEach(r => {
                        addMessage(r.userMessage, 'user');
                        addMessage(r.botResponse, 'bot'); // 这里触发的是修复后的解析逻辑
                    });
                }
            });
    }

    // 其他辅助函数保持不变
    function startNewChat() {
        localStorage.setItem('ai_studio_chat_id', 'c' + Date.now().toString(36));
        location.reload();
    }

    function loadStats() {
        fetch(`/api/chat/stats?userId=${userId}`).then(r => r.json()).then(d => {
            document.getElementById('totalChats').innerText = d.totalChats || 0;
        });
    }

    function fetchRecords(page) {
        fetch(`/api/chat/records?page=${page}&size=6&userId=${userId}`)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recordsContent');
                container.innerHTML = data.records.map(r => `
                    <div class="col-md-6 mb-4">
                        <div class="p-4 rounded-4 h-100 border history-item bg-white" onclick="switchToSession('${r.sessionId}')">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="badge bg-light text-dark border">会话: ${r.sessionId.split('_')[1] || '默认'}</span>
                                <small class="text-muted" style="font-size:0.7rem;">${r.createdTime}</small>
                            </div>
                            <div class="small text-truncate"><b>问：</b>${r.userMessage}</div>
                            <div class="small text-muted text-truncate mt-1"><b>答：</b>${r.botResponse}</div>
                        </div>
                    </div>
                `).join('');
                renderPagination(data.current, data.pages);
            });
    }

    function renderPagination(curr, total) {
        const list = document.getElementById('paginationList');
        list.innerHTML = '';
        for(let i=1; i<=total; i++) {
            list.innerHTML += `<li class="page-item ${i===curr?'active':''}"><a class="page-link text-dark ${i===curr?'bg-light':''}" href="javascript:fetchRecords(${i})">${i}</a></li>`;
        }
    }

    function switchToSession(fullId) {
        const parts = fullId.split('_');
        if(parts.length < 2) return;
        localStorage.setItem('ai_studio_user_id', parts[0]);
        localStorage.setItem('ai_studio_chat_id', parts[1]);
        location.reload();
    }

    function openRecordsModal() {
        if (!recordsModal) recordsModal = new bootstrap.Modal(document.getElementById('recordsModal'));
        recordsModal.show();
        fetchRecords(1);
    }

    let recordsModal;
    document.getElementById('sendButton').onclick = sendMessage;
    messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

    loadStats();
    loadSessionHistory();
</script>
</body>
</html>
