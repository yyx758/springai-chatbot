<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | 极简智能助手</title>
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-black: #111827;
            --primary-white: #ffffff;
            --bg-color: #f8f9fa;
            --border-light: rgba(0, 0, 0, 0.06);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
        }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(120deg, #ffffff, #f1f5f9, #ffffff, #e2e8f0);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-app { display: flex; height: 100vh; max-width: 1600px; margin: 0 auto; background: transparent; }

        .sidebar {
            width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light); display: flex; flex-direction: column; padding: 2.5rem 1.5rem; z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; padding: 0 0.5rem; }
        .brand i { background: var(--primary-black); color: var(--primary-white); padding: 10px; border-radius: 12px; font-size: 1.2rem; }

        .nav-card {
            background: transparent; border: 1px solid transparent; border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
            cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; gap: 14px; color: #475569;
        }
        .nav-card:hover { background: var(--primary-white); border-color: var(--border-light); transform: translateX(5px); box-shadow: var(--glass-shadow); color: var(--primary-black); }

        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }

        .chat-header {
            padding: 1rem 3rem; background: var(--glass-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center; z-index: 20;
        }

        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem !important;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
            background-color: var(--primary-white);
            min-width: 140px;
        }

        .chat-messages { flex: 1; overflow-y: auto; padding: 2rem 15% 10rem; scroll-behavior: smooth; }
        .message { margin-bottom: 2rem; display: flex; animation: springUp 0.4s forwards; opacity: 0; }
        @keyframes springUp { to { opacity: 1; transform: translateY(0); } from { transform: translateY(15px); } }

        .bubble { max-width: 85%; padding: 1rem 1.4rem; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; word-wrap: break-word; }
        .message.bot .bubble { background: var(--primary-white); border: 1px solid var(--border-light); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .message.user { flex-direction: row-reverse; }
        .message.user .bubble { background: var(--primary-black); color: var(--primary-white); }

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 15% 2.5rem; background: linear-gradient(to top, var(--bg-color) 80%, transparent); z-index: 15; }
        .input-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-light);
            border-radius: 24px; padding: 10px 14px 10px 24px; display: flex; align-items: center; box-shadow: var(--glass-shadow);
        }
        #messageInput { flex: 1; border: none; background: transparent; outline: none; font-size: 0.95rem; }
        .send-btn { background: var(--primary-black); color: var(--primary-white); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.2s; }

        .history-item { position: relative; cursor: pointer; transition: var(--transition-smooth); border: 1px solid var(--border-light); }
        .history-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary-black); }

        /* 删除按钮样式 */
        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 68, 68, 0.1); color: #ff4444;
            border: none; opacity: 0; transition: 0.2s;
        }
        .history-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: #ff4444; color: #fff; }

        .thinking-wave { display: flex; align-items: center; gap: 4px; height: 16px; }
        .thinking-wave .line { width: 3px; height: 100%; background: var(--primary-black); border-radius: 4px; animation: thinkWave 1s infinite alternate; }
        @keyframes thinkWave { from { height: 20%; opacity: 0.3; } to { height: 100%; opacity: 1; } }

        pre { background: #282c34; padding: 1rem; border-radius: 12px; margin: 1rem 0; overflow-x: auto; }
        code { font-family: 'Fira Code', monospace; }
        .rag-ref-bar {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 1rem;
        }
        .rag-ref-item {
            border-left: 3px solid #111827;
            padding-left: 10px;
            margin-bottom: 8px;
        }
        .knowledge-item {
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: #fff;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="main-app">
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-robot"></i>
            <h5 class="mb-0 fw-bold">AI Studio</h5>
        </div>
        <div class="nav-card" onclick="startNewChat()">
            <i class="bi bi-plus-circle"></i>
            <div>
                <div class="fw-bold small">开启新对话</div>
                <div class="text-muted" style="font-size: 0.7rem;">创建全新聊天窗口</div>
            </div>
        </div>
        <div class="nav-card" onclick="openRecordsModal()">
            <i class="bi bi-archive"></i>
            <div>
                <div class="fw-bold small">所有记录</div>
                <div class="text-muted" style="font-size: 0.7rem;">管理云端归档</div>
            </div>
        </div>
        <div class="nav-card" onclick="openKnowledgeModal()">
            <i class="bi bi-database"></i>
            <div>
                <div class="fw-bold small">知识库</div>
                <div class="text-muted" style="font-size: 0.7rem;">管理 RAG 检索文档</div>
            </div>
        </div>
        <div class="mt-auto p-3 rounded-4" style="background: rgba(255,255,255,0.4); border: 1px solid rgba(0,0,0,0.03);">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span id="currentUserDisplay" class="small text-muted">未登录</span>
                <button class="btn btn-sm btn-outline-dark py-0 px-2" onclick="logout()">退出</button>
            </div>
            <div class="d-flex justify-content-between small text-muted">
                <span>总对话</span>
                <span id="totalChats" class="fw-bold text-dark">-</span>
            </div>
        </div>
    </aside>

    <main class="chat-container">
        <header class="chat-header">
            <div class="d-flex align-items-center">
                <span class="small fw-medium text-muted"><i class="bi bi-circle-fill text-success me-2" style="font-size: 8px;"></i>服务已连接</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch m-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="ragSwitch">
                    <label class="form-check-label small text-muted" for="ragSwitch">RAG增强</label>
                </div>
                <select class="form-select custom-select w-auto" id="ragTopKSelect" style="min-width:90px;">
                    <option value="1">Top1</option>
                    <option value="3">Top3</option>
                    <option value="5">Top5</option>
                </select>
                <select class="form-select custom-select w-auto" id="modelSelect">
                    <option value="deepseek">DeepSeek v3</option>
                    <option value="ollama">Ollama Local</option>
                </select>
            </div>
        </header>

        <section class="chat-messages" id="chatMessages">
            <div class="rag-ref-bar d-none" id="ragReferenceBar"></div>
            <div class="empty-view text-center mt-5" id="emptyState">
                <h4 class="fw-bold">您好</h4>
                <p class="text-muted">输入任何问题，让我们开始探索。</p>
            </div>
        </section>

        <footer class="input-area">
            <div class="input-box">
                <input type="text" id="messageInput" placeholder="输入消息并发射..." autocomplete="off">
                <button class="send-btn" id="sendButton"><i class="bi bi-arrow-up"></i></button>
            </div>
        </footer>
    </main>
</div>

<div class="modal fade" id="recordsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 rounded-5 shadow-lg">
            <div class="modal-header border-0 px-5 pt-5 pb-3">
                <h4 class="fw-bold mb-0">云端归档</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-5 py-4">
                <div id="recordsContent" class="row"></div>
            </div>
            <div class="modal-footer border-0 p-4 justify-content-center">
                <nav><ul class="pagination pagination-sm mb-0" id="paginationList"></ul></nav>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="knowledgeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 rounded-5 shadow-lg">
            <div class="modal-header border-0 px-5 pt-5 pb-3">
                <h4 class="fw-bold mb-0">知识库（RAG）</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-5 py-3">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <input class="form-control" id="knowledgeTitle" placeholder="标题（必填）">
                    </div>
                    <div class="col-md-3">
                        <input class="form-control" id="knowledgeTags" placeholder="标签（可选）">
                    </div>
                    <div class="col-md-5">
                        <button class="btn btn-dark w-100" onclick="createKnowledgeDoc()">新增知识文档</button>
                    </div>
                    <div class="col-12">
                        <textarea class="form-control" id="knowledgeContent" rows="4" placeholder="正文内容（用于检索增强）"></textarea>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-7">
                        <h6 class="fw-bold">我的知识文档</h6>
                        <div id="knowledgeList"></div>
                    </div>
                    <div class="col-md-5">
                        <h6 class="fw-bold">检索测试</h6>
                        <div class="d-flex gap-2 mb-2">
                            <input class="form-control" id="knowledgeSearchQuery" placeholder="输入问题测试召回">
                            <button class="btn btn-outline-dark" onclick="searchKnowledge()">检索</button>
                        </div>
                        <div id="knowledgeSearchResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let authToken = localStorage.getItem('ai_studio_token') || '';
    let currentUser = JSON.parse(localStorage.getItem('ai_studio_user') || 'null');
    let chatId = localStorage.getItem('ai_studio_chat_id') || ('c' + Date.now().toString(36));
    localStorage.setItem('ai_studio_chat_id', chatId);
    let activeSessionId = '';
    let ragEnabled = localStorage.getItem('ai_studio_rag_enabled');
    ragEnabled = ragEnabled === null ? true : ragEnabled === 'true';
    let ragTopK = parseInt(localStorage.getItem('ai_studio_rag_topk') || '3', 10);

    const messagesContainer = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const emptyState = document.getElementById('emptyState');
    const sendButton = document.getElementById('sendButton');
    const currentUserDisplay = document.getElementById('currentUserDisplay');
    const ragSwitch = document.getElementById('ragSwitch');
    const ragTopKSelect = document.getElementById('ragTopKSelect');
    const ragReferenceBar = document.getElementById('ragReferenceBar');
    let knowledgeModal;
    let isStreaming = false;
    let currentAbortController = null;
    let hasStreamContent = false;
    let currentTargetBubble = null;

    function setSendButtonMode(streaming) {
        sendButton.innerHTML = streaming
            ? '<i class="bi bi-stop-fill"></i>'
            : '<i class="bi bi-arrow-up"></i>';
        sendButton.title = streaming ? '停止输出' : '发送消息';
    }

    marked.setOptions({
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        },
        breaks: true
    });

    function buildSessionId() {
        return `${currentUser.userId}_${chatId}`;
    }

    function getAuthHeaders(extraHeaders = {}) {
        return Object.assign({}, extraHeaders, authToken ? { 'Authorization': `Bearer ${authToken}` } : {});
    }

    async function authFetch(url, options = {}) {
        const mergedOptions = Object.assign({}, options);
        mergedOptions.headers = getAuthHeaders(options.headers || {});
        let response = await fetch(url, mergedOptions);
        if (response.status === 401) {
            const refreshed = await tryRefreshToken();
            if (refreshed) {
                mergedOptions.headers = getAuthHeaders(options.headers || {});
                response = await fetch(url, mergedOptions);
                if (response.status !== 401) return response;
            }
            window.location.href = '/login';
            throw new Error('未登录或登录已过期');
        }
        return response;
    }

    function persistAuth(authData) {
        authToken = authData.token || authToken;
        currentUser = {
            userId: authData.userId,
            username: authData.username,
            displayName: authData.displayName
        };
        if (authData.token) {
            localStorage.setItem('ai_studio_token', authData.token);
        }
        if (authData.refreshToken) {
            localStorage.setItem('ai_studio_refresh_token', authData.refreshToken);
        }
        localStorage.setItem('ai_studio_user', JSON.stringify(currentUser));
        currentUserDisplay.innerText = currentUser.displayName || currentUser.username;
    }

    let refreshPromise = null;

    async function tryRefreshToken() {
        const refreshToken = localStorage.getItem('ai_studio_refresh_token');
        if (!refreshToken) return false;
        if (refreshPromise) {
            await refreshPromise;
            return true;
        }
        try {
            refreshPromise = (async () => {
                const resp = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
                if (!resp.ok) {
                    logout();
                    throw new Error('refresh failed');
                }
                const data = await resp.json();
                persistAuth(data);
            })();
            await refreshPromise;
            return true;
        } catch {
            return false;
        } finally {
            refreshPromise = null;
        }
    }

    function logout() {
        localStorage.removeItem('ai_studio_token');
        localStorage.removeItem('ai_studio_refresh_token');
        localStorage.removeItem('ai_studio_user');
        authToken = '';
        currentUser = null;
        window.location.href = '/login';
    }

    async function initAuth() {
        if (!authToken) {
            window.location.href = '/login';
            return false;
        }
        try {
            const response = await authFetch('/api/auth/me');
            if (!response.ok) {
                window.location.href = '/login';
                return false;
            }
            const me = await response.json();
            persistAuth(me);
            return true;
        } catch (e) {
            return false;
        }
    }

    function afterAuthReady() {
        if (!currentUser) {
            return;
        }
        activeSessionId = buildSessionId();
        loadStats();
        loadSessionHistory();
    }

    function clearReferences() {
        ragReferenceBar.classList.add('d-none');
        ragReferenceBar.innerHTML = '';
    }

    function escapeHtml(text) {
        return (text || '').replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }

    function renderReferences(references) {
        if (!Array.isArray(references) || references.length === 0) {
            clearReferences();
            return;
        }
        ragReferenceBar.classList.remove('d-none');
        ragReferenceBar.innerHTML = `
            <div class="small fw-bold mb-2"><i class="bi bi-bookmark-check me-1"></i>RAG 命中知识片段（${references.length}）</div>
            ${references.map(ref => `
                <div class="rag-ref-item">
                    <div class="small fw-semibold">${escapeHtml(ref.title || '未命名文档')} <span class="text-muted">score:${ref.score ?? '-'}</span></div>
                    <div class="small text-muted">${escapeHtml(ref.snippet || '')}</div>
                </div>
            `).join('')}
        `;
    }

    async function sendMessage() {
        if (!currentUser) {
            window.location.href = '/login';
            return;
        }
        if (isStreaming) {
            if (currentAbortController) currentAbortController.abort();
            return;
        }

        const msg = messageInput.value.trim();
        if (!msg) return;
        if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();
        clearReferences();

        messageInput.value = '';
        addMessage(msg, 'user');

        const messageId = 'ai_' + Date.now();
        const loadingHtml = `<div class="d-flex align-items-center gap-3"><div class="thinking-wave"><div class="line"></div><div class="line"></div><div class="line"></div></div><span class="text-muted small">AI 正在思考中...</span></div>`;
        addMessage(loadingHtml, 'bot', messageId);

        const targetBubble = document.getElementById(messageId);
        currentTargetBubble = targetBubble;
        currentAbortController = new AbortController();
        hasStreamContent = false;
        isStreaming = true;
        setSendButtonMode(true);

        try {
            const response = await authFetch('/api/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                signal: currentAbortController.signal,
                body: JSON.stringify({
                    message: msg,
                    sessionId: activeSessionId,
                    model: document.getElementById('modelSelect').value,
                    useRag: ragEnabled,
                    ragTopK: ragTopK
                })
            });

            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('text/event-stream')) {
                const fallback = await response.text();
                throw new Error(`后端未返回SSE流，content-type=${contentType || 'unknown'}，body=${fallback}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (!trimmedLine.startsWith('data:')) continue;
                    const data = trimmedLine.substring(5).trim();
                    if (data === "[DONE]") continue;

                    try {
                        const json = JSON.parse(data);
                        if (Array.isArray(json.references)) {
                            renderReferences(json.references);
                            continue;
                        }
                        if (json.error) {
                            targetBubble.innerHTML = `<span class='text-danger'>${json.error}</span>`;
                            continue;
                        }
                        if (json.content && json.content !== "[DONE]") {
                            hasStreamContent = true;
                            fullText += json.content;
                            targetBubble.innerHTML = marked.parse(fullText);
                            targetBubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            scrollToBottom();
                        }
                    } catch (e) { }
                }
            }
            loadStats();
        } catch (e) {
            if (e && e.name === 'AbortError') {
                if (!hasStreamContent && currentTargetBubble) {
                    // User stopped before the first chunk arrived (thinking state).
                    currentTargetBubble.innerHTML = "<span class='text-muted'>已停止输出。</span>";
                } else if (!targetBubble.innerText.trim()) {
                    targetBubble.innerHTML = "<span class='text-muted'>已停止输出。</span>";
                }
            } else {
                targetBubble.innerHTML = `<span class='text-danger'>${e && e.message ? e.message : '连接中断，请检查状态。'}</span>`;
            }
        } finally {
            isStreaming = false;
            currentAbortController = null;
            hasStreamContent = false;
            currentTargetBubble = null;
            setSendButtonMode(false);
        }
    }

    function addMessage(content, type, id = '') {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        const displayContent = (type === 'bot' && (!id || !id.startsWith('ai_'))) ? marked.parse(content) : content;
        div.innerHTML = `<div class="bubble" ${id ? `id="${id}"` : ''}>${displayContent}</div>`;
        messagesContainer.appendChild(div);
        if(type === 'bot') div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        scrollToBottom();
    }

    function scrollToBottom() { messagesContainer.scrollTop = messagesContainer.scrollHeight; }

    function loadSessionHistory() {
        if (!activeSessionId) return;
        clearReferences();
        authFetch(`/api/chat/history/${encodeURIComponent(activeSessionId)}`)
            .then(r => r.json())
            .then(records => {
                if (records && records.length > 0) {
                    if (document.getElementById('emptyState')) document.getElementById('emptyState').remove();
                    messagesContainer.querySelectorAll('.message').forEach(node => node.remove());
                    records.forEach(r => { addMessage(r.userMessage, 'user'); addMessage(r.botResponse, 'bot'); });
                }
            });
    }

    function fetchRecords(page) {
        authFetch(`/api/chat/records?page=${page}&size=6`)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recordsContent');
                container.innerHTML = data.records.map(r => `
                    <div class="col-md-6 mb-4">
                        <div class="p-4 rounded-4 h-100 border history-item bg-white" onclick="switchToSession('${r.sessionId}')">
                            <button class="delete-btn" onclick="deleteSession(event, '${r.sessionId}', ${page})">
                                <i class="bi bi-trash3"></i>
                            </button>
                            <div class="d-flex justify-content-between mb-2 pe-4">
                                <span class="badge bg-light text-dark border">会话: ${r.sessionId.split('_')[1] || '默认'}</span>
                                <small class="text-muted" style="font-size:0.7rem;">${r.createdTime}</small>
                            </div>
                            <div class="small text-truncate"><b>问：</b>${r.userMessage}</div>
                            <div class="small text-muted text-truncate mt-1"><b>答：</b>${r.botResponse}</div>
                        </div>
                    </div>
                `).join('');
                renderPagination(data.current, data.pages);
            });
    }

    /**
     * 新增：删除会话逻辑
     */
    function deleteSession(event, sessionId, currentPage) {
        event.stopPropagation(); // 防止触发父元素的切换会话点击事件
        if (!confirm('确定要删除这个会话及其所有聊天记录吗？此操作不可撤销。')) return;

        authFetch(`/api/chat/${encodeURIComponent(sessionId)}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    // 如果删除的是当前正在聊天的会话，则开启新对话
                    if (sessionId === activeSessionId) {
                        startNewChat();
                    } else {
                        fetchRecords(currentPage); // 刷新列表
                        loadStats(); // 刷新统计
                    }
                } else {
                    alert('删除失败：' + data.message);
                }
            })
            .catch(err => alert('网络错误，请稍后重试'));
    }

    function renderPagination(curr, total) {
        const list = document.getElementById('paginationList');
        list.innerHTML = '';
        for(let i=1; i<=total; i++) {
            list.innerHTML += `<li class="page-item ${i===curr?'active':''}"><a class="page-link text-dark ${i===curr?'bg-light':''}" href="javascript:fetchRecords(${i})">${i}</a></li>`;
        }
    }

    function switchToSession(fullId) {
        const parts = fullId.split('_');
        localStorage.setItem('ai_studio_chat_id', parts[1]);
        location.reload();
    }

    function startNewChat() {
        localStorage.setItem('ai_studio_chat_id', 'c' + Date.now().toString(36));
        location.reload();
    }

    function loadStats() {
        authFetch('/api/chat/stats').then(r => r.json()).then(d => {
            document.getElementById('totalChats').innerText = d.totalChats || 0;
        });
    }

    let recordsModal;
    function openRecordsModal() {
        if (!recordsModal) recordsModal = new bootstrap.Modal(document.getElementById('recordsModal'));
        recordsModal.show();
        fetchRecords(1);
    }

    function openKnowledgeModal() {
        if (!knowledgeModal) knowledgeModal = new bootstrap.Modal(document.getElementById('knowledgeModal'));
        knowledgeModal.show();
        loadKnowledgeDocs(1);
        document.getElementById('knowledgeSearchResult').innerHTML = '';
    }

    function loadKnowledgeDocs(page = 1) {
        authFetch(`/api/knowledge/documents?page=${page}&size=20`)
            .then(r => r.json())
            .then(data => {
                const records = data.records || [];
                const container = document.getElementById('knowledgeList');
                if (records.length === 0) {
                    container.innerHTML = `<div class="small text-muted">暂无知识文档，请先新增。</div>`;
                    return;
                }
                container.innerHTML = records.map(r => `
                    <div class="knowledge-item">
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <div class="fw-semibold small">${escapeHtml(r.title)}</div>
                            <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteKnowledgeDoc(${r.id})">删除</button>
                        </div>
                        <div class="small text-muted mb-1">标签：${escapeHtml(r.tags || '无')}</div>
                        <div class="small">${escapeHtml((r.content || '').slice(0, 120))}${(r.content || '').length > 120 ? '...' : ''}</div>
                    </div>
                `).join('');
            });
    }

    function createKnowledgeDoc() {
        const title = document.getElementById('knowledgeTitle').value.trim();
        const content = document.getElementById('knowledgeContent').value.trim();
        const tags = document.getElementById('knowledgeTags').value.trim();
        if (!title || !content) {
            alert('标题和内容不能为空');
            return;
        }
        authFetch('/api/knowledge/documents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content, tags, enabled: true })
        }).then(r => r.json()).then(() => {
            document.getElementById('knowledgeTitle').value = '';
            document.getElementById('knowledgeContent').value = '';
            document.getElementById('knowledgeTags').value = '';
            loadKnowledgeDocs(1);
        }).catch(() => alert('新增知识失败'));
    }

    function deleteKnowledgeDoc(id) {
        if (!confirm('确定删除该知识文档吗？')) return;
        authFetch(`/api/knowledge/documents/${id}`, { method: 'DELETE' })
            .then(() => loadKnowledgeDocs(1))
            .catch(() => alert('删除失败'));
    }

    function searchKnowledge() {
        const query = document.getElementById('knowledgeSearchQuery').value.trim();
        if (!query) return;
        authFetch('/api/knowledge/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, topK: ragTopK })
        }).then(r => r.json()).then(list => {
            const box = document.getElementById('knowledgeSearchResult');
            if (!Array.isArray(list) || list.length === 0) {
                box.innerHTML = `<div class="small text-muted">未命中知识片段</div>`;
                return;
            }
            box.innerHTML = list.map(ref => `
                <div class="knowledge-item">
                    <div class="small fw-semibold">${escapeHtml(ref.title || '未命名文档')} <span class="text-muted">score:${ref.score ?? '-'}</span></div>
                    <div class="small text-muted">${escapeHtml(ref.snippet || '')}</div>
                </div>
            `).join('');
        });
    }

    function bindRagSettings() {
        ragSwitch.checked = ragEnabled;
        ragTopKSelect.value = String(ragTopK);
        ragSwitch.addEventListener('change', () => {
            ragEnabled = ragSwitch.checked;
            localStorage.setItem('ai_studio_rag_enabled', String(ragEnabled));
        });
        ragTopKSelect.addEventListener('change', () => {
            ragTopK = Number(ragTopKSelect.value) || 3;
            localStorage.setItem('ai_studio_rag_topk', String(ragTopK));
        });
    }

    setSendButtonMode(false);
    bindRagSettings();
    sendButton.onclick = sendMessage;
    messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

    initAuth().then(authed => {
        if (authed) {
            afterAuthReady();
        }
    });
</script>
</body>
</html>
