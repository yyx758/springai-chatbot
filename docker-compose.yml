services:
  # ============================================
  # 基础设施层
  # ============================================

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: chatbot-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: chatbot
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka（KRaft 模式）
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chatbot-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Nacos 注册中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: chatbot-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5

  # PGVector 向量数据库（默认不启动，使用 --profile vector 启用）
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: chatbot-pgvector
    profiles:
      - vector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-chatbot_vector}
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DB:-chatbot_vector}"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: chatbot-elasticsearch
    profiles:
      - elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ============================================
  # 应用层
  # ============================================

  # 主服务（Chatbot）
  chatbot-service:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: chatbot-service
    expose:
      - "8080"
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Kafka（容器内通信使用 INTERNAL 监听器 29092）
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Nacos
      NACOS_SERVER_ADDR: nacos:8848
      # JWT
      APP_JWT_SECRET: ${APP_JWT_SECRET:?请在 .env 中设置 APP_JWT_SECRET}
      # AI 模型
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SPRING_AI_OPENAI_ENABLED: ${SPRING_AI_OPENAI_ENABLED:-false}
      # RAG / Vector（默认混合模式，需要 PGVector + embedding 服务）
      APP_RAG_MODE: ${APP_RAG_MODE:-hybrid}
      APP_RAG_VECTOR_ENABLED: ${APP_RAG_VECTOR_ENABLED:-true}
      APP_RAG_VECTOR_JDBC_URL: ${APP_RAG_VECTOR_JDBC_URL:-jdbc:postgresql://pgvector:5432/chatbot_vector}
      APP_RAG_VECTOR_USERNAME: ${APP_RAG_VECTOR_USERNAME:-postgres}
      APP_RAG_VECTOR_PASSWORD: ${APP_RAG_VECTOR_PASSWORD:-postgres}
      APP_RAG_VECTOR_DIMENSIONS: ${APP_RAG_VECTOR_DIMENSIONS:-1024}
      APP_RAG_EMBEDDING_PROVIDER: ${APP_RAG_EMBEDDING_PROVIDER:-openai-compatible}
      APP_RAG_EMBEDDING_MODEL: ${APP_RAG_EMBEDDING_MODEL:-text-embedding-v4}
      APP_RAG_EMBEDDING_BASE_URL: ${APP_RAG_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      APP_RAG_EMBEDDING_API_KEY: ${APP_RAG_EMBEDDING_API_KEY:-}
      APP_RAG_ELASTICSEARCH_ENABLED: ${APP_RAG_ELASTICSEARCH_ENABLED:-false}
      APP_RAG_ELASTICSEARCH_BASE_URL: ${APP_RAG_ELASTICSEARCH_BASE_URL:-http://elasticsearch:9200}
      APP_RAG_ELASTICSEARCH_INDEX: ${APP_RAG_ELASTICSEARCH_INDEX:-ai_studio_knowledge_v3}
      # SMTP 邮件配置
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # JVM 调优
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
      # 文件服务地址（容器内通信用 Docker 服务名）
      FILE_SERVICE_URL: http://file-service:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # 文件服务
  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: file-service
    expose:
      - "8081"
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Nacos
      NACOS_SERVER_ADDR: nacos:8848
      # JVM 调优
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
    volumes:
      - file-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Gateway 网关
  chatbot-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: chatbot-gateway
    ports:
      - "9000:9000"
    environment:
      # Nacos（容器内通信）
      NACOS_SERVER_ADDR: nacos:8848
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT（必须与主服务一致）
      APP_JWT_SECRET: ${APP_JWT_SECRET:?请在 .env 中设置 APP_JWT_SECRET}
      # JVM 调优
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
    depends_on:
      - chatbot-service

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  nacos-data:
  file-uploads:
  pgvector-data:
  elasticsearch-data:
