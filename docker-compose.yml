services:
  # ============================================
  # 基础设施层
  # ============================================

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: chatbot-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: yyx2005yyx
      MYSQL_DATABASE: chatbot
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass yyx2005yyx
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "yyx2005yyx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka（KRaft 模式）
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chatbot-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Nacos 注册中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: chatbot-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================
  # 应用层
  # ============================================

  # 主服务（Chatbot）
  chatbot-service:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: chatbot-service
    ports:
      - "8080:8080"
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yyx2005yyx
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: yyx2005yyx
      # Kafka（容器内通信使用 INTERNAL 监听器 29092）
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Nacos
      NACOS_SERVER_ADDR: nacos:8848
      # JWT
      APP_JWT_SECRET: change-this-dev-secret-key-at-least-32-chars
      # AI 模型
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SPRING_AI_OPENAI_ENABLED: ${SPRING_AI_OPENAI_ENABLED:-false}
      # SMTP 邮件配置
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # JVM 调优
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # 文件服务
  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: file-service
    ports:
      - "8081:8081"
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yyx2005yyx
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: yyx2005yyx
      # Nacos
      NACOS_SERVER_ADDR: nacos:8848
      # JVM 调优
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
    volumes:
      - file-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Gateway 网关
  chatbot-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: chatbot-gateway
    ports:
      - "9000:9000"
    environment:
      # Nacos（容器内通信）
      NACOS_SERVER_ADDR: nacos:8848
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: yyx2005yyx
      # JWT（必须与主服务一致）
      APP_JWT_SECRET: change-this-dev-secret-key-at-least-32-chars
      # JVM 调优
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
    depends_on:
      - chatbot-service

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  nacos-data:
  file-uploads:
