server:
  port: 8081

spring:
  application:
    name: file-service

  # Nacos 服务注册
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: public

  # 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:}

  # Flyway（使用独立的 schema 表，避免与 chatbot-service 冲突）
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_file
    locations: classpath:db/migration

  # Thymeleaf 模板引擎
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: false

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: ${SPRING_DATASOURCE_PASSWORD:}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.file.entity
  configuration:
    map-underscore-to-camel-case: true

# 文件存储配置
file:
  storage:
    type: LOCAL
    local:
      base-path: ./uploads
      url-prefix: /api/files

# 日志
logging:
  level:
    com.example.file: DEBUG
