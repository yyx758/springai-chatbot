# 生产环境 Docker Compose（2GB 内存服务器优化）
# 保留所有服务，仅降低内存占用
# 用法: docker-compose -f docker-compose.prod.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: chatbot-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: chatbot
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    command: --max-connections=30 --innodb-buffer-pool-size=32M --performance-schema=OFF --skip-log-bin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 32mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chatbot-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms100m -Xmx200m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 10s
      retries: 15

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: chatbot-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 96m
      JVM_XMX: 128m
      JVM_XMN: 48m
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 20s
      timeout: 10s
      retries: 15

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: chatbot-pgvector
    profiles:
      - vector
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-chatbot_vector}
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DB:-chatbot_vector}"]
      interval: 20s
      timeout: 10s
      retries: 10

  chatbot-service:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: chatbot-service
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NACOS_SERVER_ADDR: nacos:8848
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-to-a-random-string-at-least-32-chars}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SPRING_AI_OPENAI_ENABLED: ${SPRING_AI_OPENAI_ENABLED:-false}
      APP_RAG_MODE: ${APP_RAG_MODE:-keyword}
      APP_RAG_VECTOR_ENABLED: ${APP_RAG_VECTOR_ENABLED:-false}
      APP_RAG_VECTOR_JDBC_URL: ${APP_RAG_VECTOR_JDBC_URL:-}
      APP_RAG_VECTOR_USERNAME: ${APP_RAG_VECTOR_USERNAME:-postgres}
      APP_RAG_VECTOR_PASSWORD: ${APP_RAG_VECTOR_PASSWORD:-postgres}
      APP_RAG_VECTOR_DIMENSIONS: ${APP_RAG_VECTOR_DIMENSIONS:-1024}
      APP_RAG_EMBEDDING_PROVIDER: ${APP_RAG_EMBEDDING_PROVIDER:-remote-ollama}
      APP_RAG_EMBEDDING_MODEL: ${APP_RAG_EMBEDDING_MODEL:-bge-m3}
      APP_RAG_EMBEDDING_BASE_URL: ${APP_RAG_EMBEDDING_BASE_URL:-}
      APP_RAG_EMBEDDING_PATH: ${APP_RAG_EMBEDDING_PATH:-}
      APP_RAG_EMBEDDING_API_KEY: ${APP_RAG_EMBEDDING_API_KEY:-}
      APP_RAG_EMBEDDING_ENCODING_FORMAT: ${APP_RAG_EMBEDDING_ENCODING_FORMAT:-float}
      APP_WEB_TOOLS_ENABLED: ${APP_WEB_TOOLS_ENABLED:-false}
      APP_WEB_TOOLS_PROVIDER: ${APP_WEB_TOOLS_PROVIDER:-firecrawl}
      APP_WEB_TOOLS_MAX_RESULTS: ${APP_WEB_TOOLS_MAX_RESULTS:-5}
      APP_WEB_TOOLS_FETCH_TIMEOUT_MS: ${APP_WEB_TOOLS_FETCH_TIMEOUT_MS:-15000}
      APP_WEB_TOOLS_MAX_CONTENT_CHARS: ${APP_WEB_TOOLS_MAX_CONTENT_CHARS:-100000}
      APP_FIRECRAWL_BASE_URL: ${APP_FIRECRAWL_BASE_URL:-https://api.firecrawl.dev}
      APP_FIRECRAWL_API_KEY: ${APP_FIRECRAWL_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxRAM=350m"
      FILE_SERVICE_URL: http://file-service:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: file-service
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NACOS_SERVER_ADDR: nacos:8848
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxRAM=160m"
    volumes:
      - file-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatbot-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: chatbot-gateway
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-to-a-random-string-at-least-32-chars}
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxRAM=160m"
    depends_on:
      - chatbot-service

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  nacos-data:
  file-uploads:
  pgvector-data:
