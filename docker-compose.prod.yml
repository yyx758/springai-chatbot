# 生产环境 Docker Compose（2GB 内存服务器优化）
# 保留所有服务，仅降低内存占用
# 用法: docker-compose -f docker-compose.prod.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: chatbot-mysql
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: chatbot
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    command: --max-connections=30 --innodb-buffer-pool-size=32M --performance-schema=OFF --skip-log-bin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 32mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chatbot-kafka
    expose:
      - "9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms100m -Xmx200m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 10s
      retries: 15

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: chatbot-nacos
    expose:
      - "8848"
      - "9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 96m
      JVM_XMX: 128m
      JVM_XMN: 48m
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 20s
      timeout: 10s
      retries: 15

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: chatbot-pgvector
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-chatbot_vector}
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
    # 2GB/4GB 服务器内存调优：限制 postgres 内存占用
    command: >
      postgres
      -c shared_buffers=64MB
      -c max_connections=20
      -c effective_cache_size=192MB
      -c maintenance_work_mem=32MB
      -c work_mem=4MB
    deploy:
      resources:
        limits:
          memory: 384m
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DB:-chatbot_vector}"]
      interval: 20s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.15.3
    container_name: chatbot-elasticsearch
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms384m -Xmx384m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  chatbot-service:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: chatbot-service
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      SPRING_FLYWAY_OUT_OF_ORDER: ${SPRING_FLYWAY_OUT_OF_ORDER:-true}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NACOS_SERVER_ADDR: nacos:8848
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SPRING_AI_OPENAI_ENABLED: ${SPRING_AI_OPENAI_ENABLED:-false}
      APP_RAG_MODE: ${APP_RAG_MODE:-hybrid}
      APP_RAG_VECTOR_ENABLED: ${APP_RAG_VECTOR_ENABLED:-true}
      APP_RAG_VECTOR_JDBC_URL: ${APP_RAG_VECTOR_JDBC_URL:-jdbc:postgresql://pgvector:5432/chatbot_vector}
      APP_RAG_VECTOR_USERNAME: ${APP_RAG_VECTOR_USERNAME:-postgres}
      APP_RAG_VECTOR_PASSWORD: ${APP_RAG_VECTOR_PASSWORD:-postgres}
      APP_RAG_VECTOR_DIMENSIONS: ${APP_RAG_VECTOR_DIMENSIONS:-1024}
      APP_RAG_EMBEDDING_PROVIDER: ${APP_RAG_EMBEDDING_PROVIDER:-openai-compatible}
      APP_RAG_EMBEDDING_MODEL: ${APP_RAG_EMBEDDING_MODEL:-text-embedding-v4}
      APP_RAG_EMBEDDING_BASE_URL: ${APP_RAG_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      APP_RAG_EMBEDDING_PATH: ${APP_RAG_EMBEDDING_PATH:-/v1/embeddings}
      APP_RAG_EMBEDDING_API_KEY: ${APP_RAG_EMBEDDING_API_KEY:-}
      APP_RAG_EMBEDDING_ENCODING_FORMAT: ${APP_RAG_EMBEDDING_ENCODING_FORMAT:-float}
      APP_RAG_ELASTICSEARCH_ENABLED: ${APP_RAG_ELASTICSEARCH_ENABLED:-true}
      APP_RAG_ELASTICSEARCH_BASE_URL: ${APP_RAG_ELASTICSEARCH_BASE_URL:-http://elasticsearch:9200}
      APP_RAG_ELASTICSEARCH_INDEX: ${APP_RAG_ELASTICSEARCH_INDEX:-ai_studio_knowledge}
      APP_WEB_TOOLS_ENABLED: ${APP_WEB_TOOLS_ENABLED:-false}
      APP_WEB_TOOLS_PROVIDER: ${APP_WEB_TOOLS_PROVIDER:-firecrawl}
      APP_WEB_TOOLS_MAX_RESULTS: ${APP_WEB_TOOLS_MAX_RESULTS:-5}
      APP_WEB_TOOLS_FETCH_TIMEOUT_MS: ${APP_WEB_TOOLS_FETCH_TIMEOUT_MS:-15000}
      APP_WEB_TOOLS_MAX_CONTENT_CHARS: ${APP_WEB_TOOLS_MAX_CONTENT_CHARS:-100000}
      APP_FIRECRAWL_BASE_URL: ${APP_FIRECRAWL_BASE_URL:-https://api.firecrawl.dev}
      APP_FIRECRAWL_API_KEY: ${APP_FIRECRAWL_API_KEY:-}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxRAM=350m"
      FILE_SERVICE_URL: http://file-service:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: file-service
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatbot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      NACOS_SERVER_ADDR: nacos:8848
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxRAM=160m"
    volumes:
      - file-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatbot-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: chatbot-gateway
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET is required}
      APP_CORS_CLOUDFLARE_DOMAIN: ${APP_CORS_CLOUDFLARE_DOMAIN:-https://yyyyx.top}
      APP_CORS_CLOUDFLARE_DOMAIN_WWW: ${APP_CORS_CLOUDFLARE_DOMAIN_WWW:-https://www.yyyyx.top}
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxRAM=160m"
    depends_on:
      - chatbot-service

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  nacos-data:
  file-uploads:
  pgvector-data:
  elasticsearch-data:
